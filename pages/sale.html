<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SALE 브랜드 안내 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../static/css/fonts.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#C8102E;
  --accent-bg:#FFF1F3;
  --page:#F2F1EC;
  --white:#FFFFFF;
  --border:#DDDBD3;
  --border-md:#C9C7BF;
  --tx-dark:#181816;
  --tx-mid:#6B6B66;
  --tx-light:#AEADA7;
  --tx-hint:#C8C7C0;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
  --fn:'MaisonNeue','Noto Sans KR',sans-serif;
  --form-w:420px;
}
body{font-family:var(--fn);background:var(--page);color:var(--tx-dark);font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.topbar{height:54px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;z-index:100;}
.tb-logo{display:flex;align-items:center;gap:10px}
.tb-badge{font-size:10px;font-weight:700;letter-spacing:.6px;padding:4px 9px;border-radius:5px;background:#E60012;color:#fff;text-transform:uppercase;}
.tb-name{font-size:14px;font-weight:700;color:var(--tx-dark);letter-spacing:-.3px}
.tb-desc{font-size:12px;color:var(--tx-light);flex:1;letter-spacing:-.1px}
.tb-divider{width:1px;height:22px;background:var(--border)}
.tb-btn{height:34px;padding:0 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;font-family:var(--fn);cursor:pointer;border:none;display:flex;align-items:center;gap:6px;transition:all .15s;letter-spacing:-.1px;}
.tb-btn-ghost{background:transparent;border:1px solid var(--border);color:var(--tx-mid)}
.tb-btn-ghost:hover{border-color:var(--border-md);color:var(--tx-dark);background:#FAFAF7}
.tb-btn-fill{background:var(--tx-dark);color:#fff}
.tb-btn-fill:hover{background:#2A2A28}
.tb-btn-fill:disabled{background:#C0BFB8;cursor:not-allowed}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* FORM PANEL */
.form-panel{width:var(--form-w);min-width:var(--form-w);background:var(--page);border-right:1px solid var(--border);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.form-panel::-webkit-scrollbar{width:4px}
.form-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.form-body{padding:20px;display:flex;flex-direction:column;gap:6px}

/* 섹션 카드 */
.sec{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;}
.sec-header{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--white);}
.sec-num{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.sec-title{flex:1;font-size:13px;font-weight:700;color:var(--tx-dark);letter-spacing:-.2px}
.sec-tag{font-size:10px;font-weight:700;color:var(--tx-light);background:var(--page);border:1px solid var(--border);padding:3px 8px;border-radius:20px;letter-spacing:.2px;}
.sec-body{padding:18px;display:flex;flex-direction:column;gap:14px}

/* 폼 필드 */
.field{display:flex;flex-direction:column;gap:6px}
.field-label-ko{font-size:12px;font-weight:500;color:var(--tx-mid);display:flex;align-items:center;justify-content:space-between;}
.byte-counter{font-size:11px;font-weight:400;color:var(--tx-hint);margin-left:auto;}
.byte-counter.over{color:#E03030;font-weight:600;}

input[type=text],textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--fn);font-weight:400;color:var(--tx-dark);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;line-height:1.6;letter-spacing:-.1px;}
input[type=text]:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,16,46,.08);}
input::placeholder,textarea::placeholder{color:var(--tx-hint);font-weight:300}
textarea{resize:vertical;min-height:72px}

/* 이미지 업로더 */
.uploader{border:1.5px dashed var(--border);border-radius:var(--radius-md);cursor:pointer;overflow:hidden;transition:border-color .15s,background .15s;background:#FAFAF7;}
.uploader:hover{border-color:var(--accent);background:#FFF7F8;}
.upl-empty{padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.upl-icon{width:36px;height:36px;border-radius:10px;background:var(--page);display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid var(--border);}
.upl-title{font-size:12px;font-weight:700;color:var(--tx-mid)}
.upl-sub{font-size:11px;color:var(--tx-hint);font-weight:300}
.upl-filled{position:relative}
.upl-filled img{width:100%;display:block;max-height:160px;object-fit:cover;border-radius:calc(var(--radius-md) - 2px);}
.upl-remove{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(18,18,16,.6);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:background .15s;backdrop-filter:blur(4px);}
.upl-remove:hover{background:rgba(200,16,46,.8)}
input[type=file]{display:none}

/* 가변 카드 */
.vcard-list{display:flex;flex-direction:column;gap:8px}
.vcard{background:var(--page);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;}
.vcard-head{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:#FAFAF7;}
.vcard-label{font-size:11px;font-weight:700;letter-spacing:.3px;padding:3px 9px;border-radius:20px;flex:1;}
.vcard-del{width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx-light);font-size:11px;font-weight:700;transition:all .12s;line-height:1;}
.vcard-del:hover{border-color:#E55;color:#E55;background:#FFF2F2}
.vcard-body{padding:14px;display:flex;flex-direction:column;gap:11px}
.add-card-btn{width:100%;padding:10px;border:1.5px dashed var(--border);border-radius:var(--radius-md);background:transparent;cursor:pointer;font-size:12px;font-weight:700;color:var(--tx-light);font-family:var(--fn);transition:all .15s;letter-spacing:-.1px;display:flex;align-items:center;justify-content:center;gap:6px;}
.add-card-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}

/* PREVIEW PANEL */
.preview-panel{flex:1;overflow-y:auto;background:#B8B6AD;display:flex;flex-direction:column;align-items:center;padding:32px 24px 48px;gap:0;}
.preview-chip{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.45);text-transform:uppercase;margin-bottom:16px;font-family:var(--fn);}
.preview-frame{width:390px;background:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.06),0 24px 80px rgba(0,0,0,.22),0 8px 24px rgba(0,0,0,.12);border-radius:2px;}

/* OUTPUT */
#output{width:390px;background:#fff;font-family:'MaisonNeue','Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;word-break:break-all;overflow-wrap:break-word;}

/* 헤더 */
.o-hd{padding:48px 30px 40px;position:relative;}
.o-hd-t1{font-size:30px;font-weight:500;letter-spacing:.5px;line-height:1.1;text-transform:uppercase;font-family:'MaisonNeue','Noto Sans KR',sans-serif;}
.o-hd-t2{font-size:54px;font-weight:800;letter-spacing:-.5px;line-height:1.05;text-transform:uppercase;margin-top:2px;font-family:'MaisonNeue','Noto Sans KR',sans-serif;}
.o-hd-desc{font-size:15px;font-weight:400;line-height:1.7;margin-top:26px;word-break:keep-all;font-family:'Noto Sans KR',sans-serif;}
.o-hd-meta{display:flex;flex-direction:column;gap:8px;margin-top:32px;}
.o-hd-row{display:flex;align-items:baseline;font-size:16px;font-weight:400;}
.o-hd-key{width:64px;flex-shrink:0;font-weight:400;}
.o-hd-val{flex:1;line-height:1.5;word-break:keep-all;font-weight:500;}

/* SALE 항목 */
.o-sale{padding:0 0 8px;}
.o-sale-item{padding:28px 0 8px;}
.o-sale-rate{font-size:30px;font-weight:800;color:#111;letter-spacing:-.5px;padding:0 24px;margin-bottom:20px;font-family:'MaisonNeue','Noto Sans KR',sans-serif;}
.o-sale-img-wrap{width:100%;line-height:0;margin-bottom:24px;}
.o-sale-img{width:390px;height:220px;object-fit:cover;display:block;}
.o-sale-img-ph{width:390px;height:220px;background:#EDECEA;display:flex;align-items:center;justify-content:center;font-size:12px;color:#C0BFB8;font-weight:300;}
.o-sale-cat{padding:0 24px;margin-bottom:22px;}
.o-sale-cat:last-child{margin-bottom:8px;}
.o-sale-cat-title{font-size:22px;font-weight:500;color:#111;letter-spacing:-.3px;margin-bottom:12px;line-height:1.3;word-break:keep-all;font-family:'MaisonNeue','Noto Sans KR',sans-serif;}
.o-sale-cat-brands{font-size:14px;font-weight:400;color:#8A8A84;line-height:1.9;white-space:pre-wrap;word-break:keep-all;font-family:'Noto Sans KR',sans-serif;}
.o-sale-divider{height:1px;background:#EDECEA;margin:24px 24px 0;}

/* 참고사항 */
.o-notes{padding:22px 24px 30px;background:#F6F5EF;margin-top:8px;}
.o-notes-ttl{font-size:16px;font-weight:500;color:#111;letter-spacing:-.3px;margin-bottom:10px;font-family:'MaisonNeue','Noto Sans KR',sans-serif;}
.o-notes-txt{font-size:13px;font-weight:300;color:#6B6B66;line-height:1.95;white-space:pre-wrap;word-break:keep-all;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#18181A;color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20000;white-space:nowrap;font-family:var(--fn);box-shadow:0 4px 20px rgba(0,0,0,.25);}
.toast.show{opacity:1}

/* EXAMPLE MODAL */
.ex-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;align-items:flex-start;justify-content:center;backdrop-filter:blur(3px);padding:32px 24px;}
.ex-modal-overlay.show{display:flex}
.ex-modal{background:#fff;border-radius:16px;width:440px;max-width:100%;max-height:calc(100vh - 64px);display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.35);animation:modalIn .2s ease;overflow:hidden;}
.ex-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.ex-modal-title{font-size:13px;font-weight:700;color:var(--tx-dark);letter-spacing:-.1px;}
.ex-modal-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--tx-mid);transition:all .15s;font-family:var(--fn);}
.ex-modal-close:hover{background:var(--page);color:var(--tx-dark);}
.ex-modal-body{overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.ex-modal-body::-webkit-scrollbar{width:4px}
.ex-modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.ex-modal-img{width:100%;display:block;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1);}

/* LOAD BAR */
.load-bar{display:flex;gap:8px;align-items:center;padding:14px 16px;background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);}
.load-bar input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--fn);font-weight:500;color:var(--tx-dark);letter-spacing:.5px;outline:none;transition:border-color .15s;}
.load-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,16,46,.08);}
.load-bar input::placeholder{color:var(--tx-hint);font-weight:300}
.load-bar button{height:38px;padding:0 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;font-family:var(--fn);cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--tx-mid);transition:all .15s;white-space:nowrap;}
.load-bar button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.load-bar button:disabled{opacity:.5;cursor:not-allowed;}

/* SAVE MODAL */
.save-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.save-modal-overlay.show{display:flex}
.save-modal{background:#fff;border-radius:16px;padding:36px 32px 28px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.save-modal-icon{font-size:36px;margin-bottom:12px;color:#2A8847;}
.save-modal-title{font-size:18px;font-weight:700;color:var(--tx-dark);margin-bottom:16px;}
.save-modal-code{font-size:22px;font-weight:700;font-family:monospace;letter-spacing:2px;color:var(--accent);background:var(--accent-bg);padding:12px 20px;border-radius:10px;margin-bottom:16px;user-select:all;}
.save-modal-msg{font-size:12px;color:var(--tx-mid);line-height:1.7;margin-bottom:20px;}
.save-modal-copy{width:100%;padding:11px;border:none;border-radius:var(--radius-sm);background:var(--tx-dark);color:#fff;font-size:13px;font-weight:700;font-family:var(--fn);cursor:pointer;margin-bottom:8px;transition:background .15s;}
.save-modal-copy:hover{background:#2A2A28}
.save-modal-close{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--tx-mid);font-size:12px;font-weight:500;font-family:var(--fn);cursor:pointer;transition:all .15s;}
.save-modal-close:hover{background:var(--page)}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="home.html" class="tb-btn tb-btn-ghost" style="text-decoration:none;margin-right:4px">← 홈</a>
  <div class="tb-divider"></div>
  <div class="tb-logo">
    <span class="tb-badge">SALE</span>
    <span class="tb-name">SALE 브랜드 안내 생성기</span>
  </div>
  <div class="tb-divider"></div>
  <span class="tb-desc">JPG 내보내기</span>
  <button class="tb-btn tb-btn-ghost" onclick="openExample()">예시</button>
  <button class="tb-btn tb-btn-ghost" onclick="resetAll()">초기화</button>
  <button class="tb-btn tb-btn-ghost" id="tmpbtn" onclick="doTempSave()">임시저장</button>
  <button class="tb-btn tb-btn-fill" id="expbtn" onclick="doExport()">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v8M3.5 5.5L7 9l3.5-3.5M1 11.5h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    JPG 내보내기
  </button>
</div>

<!-- MAIN -->
<div class="layout">

  <!-- FORM -->
  <div class="form-panel">
    <div class="form-body">

      <!-- Load -->
      <div class="load-bar">
        <input type="text" id="load-code" placeholder="SALE-XXXXXX" maxlength="11"/>
        <button id="load-btn" onclick="doLoad()">불러오기</button>
      </div>

      <!-- 1. 헤더 -->
      <div class="sec">
        <div class="sec-header">
          <div class="sec-num" style="background:#FFE5E7;color:#E60012">1</div>
          <span class="sec-title">헤더</span>
        </div>
        <div class="sec-body">
          <div class="field">
            <span class="field-label-ko">타이틀 첫째줄 <span style="color:var(--tx-hint);font-weight:300;font-size:11px">· 영문 대문자</span><span class="byte-counter" id="cnt-t1">0자/16자</span></span>
            <input type="text" id="f-t1" placeholder="SUMMER" oninput="this.value=this.value.toUpperCase();updateCharCount(this,'cnt-t1',16);render()"/>
          </div>
          <div class="field">
            <span class="field-label-ko">타이틀 둘째줄 <span style="color:var(--tx-hint);font-weight:300;font-size:11px">· 영문 대문자</span><span class="byte-counter" id="cnt-t2">0자/12자</span></span>
            <input type="text" id="f-t2" placeholder="SALE" oninput="this.value=this.value.toUpperCase();updateCharCount(this,'cnt-t2',12);render()"/>
          </div>
          <div class="field">
            <span class="field-label-ko">행사 설명 <span style="color:var(--tx-hint);font-weight:300;font-size:11px">· 선택</span></span>
            <textarea id="f-desc" rows="2" placeholder="다양한 상품 혜택과 함께&#10;올 여름 스타일링을 완성해보세요" oninput="render()"></textarea>
          </div>
          <div class="field">
            <span class="field-label-ko">기간 <span class="byte-counter" id="cnt-period">0자/22자</span></span>
            <input type="text" id="f-period" placeholder="6.26(금) - 7.12(일)" oninput="updateCharCount(this,'cnt-period',22);render()"/>
          </div>
          <div class="field">
            <span class="field-label-ko">장소 <span class="byte-counter" id="cnt-loc">0자/22자</span></span>
            <input type="text" id="f-loc" placeholder="OO백화점 전점" oninput="updateCharCount(this,'cnt-loc',22);render()"/>
          </div>
          <div class="field">
            <span class="field-label-ko">헤더 배경색</span>
            <div style="display:flex;gap:8px;flex-wrap:wrap" id="swatch-row"></div>
            <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--page);border-radius:var(--radius-sm);border:1.5px solid var(--border);cursor:pointer;" onclick="document.getElementById('cpicker').click()">
              <div id="cdot-preview" style="width:22px;height:22px;border-radius:6px;background:#E60012;border:1px solid rgba(0,0,0,.08);flex-shrink:0;"></div>
              <span id="chex" style="font-size:12px;font-family:monospace;font-weight:500;color:var(--tx-mid);flex:1;letter-spacing:.5px;">#E60012</span>
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none" style="color:var(--tx-hint)"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
              <input type="color" id="cpicker" value="#E60012" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none" oninput="applyColor(this.value,'','')"/>
            </div>
            <span style="font-size:11px;color:var(--tx-hint);font-weight:300">헤더는 선택한 색상의 그라데이션으로 표현됩니다.</span>
          </div>
        </div>
      </div>

      <!-- 2. SALE 정보 -->
      <div class="sec">
        <div class="sec-header">
          <div class="sec-num" style="background:#FFE5E7;color:#E60012">2</div>
          <span class="sec-title">SALE 정보</span>
          <span class="sec-tag" id="sale-cnt">0개</span>
        </div>
        <div class="sec-body">
          <div class="vcard-list" id="sale-list"></div>
          <button class="add-card-btn" onclick="addSale()">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            세일률 추가
          </button>
        </div>
      </div>

      <!-- 3. 참고사항 -->
      <div class="sec">
        <div class="sec-header">
          <div class="sec-num" style="background:#F2F1EC;color:#888">3</div>
          <span class="sec-title">참고사항</span>
          <span class="sec-tag">선택</span>
        </div>
        <div class="sec-body">
          <textarea id="f-notes" rows="4"
            placeholder="※ 세일 품목 및 할인율은 브랜드별로 상이할 수 있습니다&#10;※ 일부 품목은 세일에서 제외됩니다"
            oninput="render()"></textarea>
        </div>
      </div>

    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div class="preview-chip">Preview · 390px</div>
    <div class="preview-frame">
      <div id="output"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- 저장 완료 팝업 -->
<div class="save-modal-overlay" id="save-modal" onclick="closeSaveModal(event)">
  <div class="save-modal">
    <div class="save-modal-icon">✓</div>
    <div class="save-modal-title">저장 완료</div>
    <div class="save-modal-code" id="save-modal-code">SALE-XXXXXX</div>
    <div class="save-modal-msg">콘텐츠 수정시 해당 코드를 활용해<br>콘텐츠 불러오기할 수 있습니다.<br>코드를 별도로 보관해주세요.</div>
    <button class="save-modal-copy" onclick="copySaveCode()">코드 복사</button>
    <button class="save-modal-close" onclick="closeSaveModal()">닫기</button>
  </div>
</div>

<!-- 예시 이미지 팝업 -->
<div class="ex-modal-overlay" id="ex-modal" onclick="closeExample(event)">
  <div class="ex-modal">
    <div class="ex-modal-header">
      <span class="ex-modal-title">✦ 예시 이미지</span>
      <button class="ex-modal-close" onclick="closeExample()">✕</button>
    </div>
    <div class="ex-modal-body">
      <img src="../examples/ex_sale.jpg" alt="예시 이미지" class="ex-modal-img"/>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>

// ─── APPS SCRIPT ─────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZnJ_SrTV6YGFZNadBjghIiQwepHgDGRdwDNW__VdPLm1oywONwX9KGsPPJErCqKLYvQ/exec';

// ─── COLOR ───────────────────────────────────────────────────
const PRESETS = [
  { h:'#E60012', n:'레드' },
  { h:'#000000', n:'블랙' },
  { h:'#1b2664', n:'네이비' },
  { h:'#6f4898', n:'퍼플' },
  { h:'#4d6c46', n:'그린' },
  { h:'#59789f', n:'블루' },
  { h:'#ff9548', n:'오렌지' },
  { h:'#67434a', n:'버건디' },
];

let headerBg = '#E60012';

function getLuminance(hex) {
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  return 0.299*r+0.587*g+0.114*b;
}

// hex 밝기 조정 (amt: 양수=밝게, 음수=어둡게)
function shade(hex, amt) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,Math.round(r+255*amt)));
  g=Math.max(0,Math.min(255,Math.round(g+255*amt)));
  b=Math.max(0,Math.min(255,Math.round(b+255*amt)));
  const toHex=x=>x.toString(16).padStart(2,'0');
  return '#'+toHex(r)+toHex(g)+toHex(b);
}

// 헤더 그라데이션 생성
function headerGradient(hex) {
  return `linear-gradient(150deg, ${shade(hex,0.12)} 0%, ${hex} 55%, ${shade(hex,-0.12)} 100%)`;
}

function applyColor(hex, idx, name) {
  headerBg = hex;
  const dot = document.getElementById('cdot-preview');
  if (dot) { dot.style.background = hex; dot.style.border = getLuminance(hex)>0.85?'1.5px solid #DDD':'1px solid rgba(0,0,0,.06)'; }
  const hexEl = document.getElementById('chex'); if (hexEl) hexEl.textContent = hex.toUpperCase();
  const picker = document.getElementById('cpicker'); if (picker) picker.value = hex;
  document.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('active'));
  if (idx !== '') { const sw=document.getElementById('sw-'+idx); if(sw) sw.classList.add('active'); }
  render();
}

function buildSwatches() {
  const row = document.getElementById('swatch-row');
  PRESETS.forEach((p,i) => {
    const lum = getLuminance(p.h);
    const d = document.createElement('div');
    d.className = 'cswatch' + (i===0?' active':'');
    d.id = 'sw-'+i;
    d.style.cssText = `width:32px;height:32px;border-radius:8px;cursor:pointer;position:relative;transition:transform .12s;flex-shrink:0;background:${p.h};${lum>0.85?'border:1.5px solid var(--border)':''}`;
    d.title = p.n;
    d.onclick = () => applyColor(p.h, i, p.n);
    row.appendChild(d);
  });
  const style = document.createElement('style');
  style.textContent = `.cswatch.active::after{content:'';position:absolute;inset:-3px;border-radius:11px;border:2px solid var(--tx-dark);}`;
  document.head.appendChild(style);
  applyColor('#E60012', 0, '레드');
}

// ─── SALE 정보 ───────────────────────────────────────────────
let sales = [], saleIdx = 0;

function addSale() {
  const id = ++saleIdx;
  sales.push({ id, img:null, imgRaw:null, imgCropX:50, imgCropY:50, rate:'', catIdx:0, cats:[] });
  const s = sales.find(s=>s.id===id);
  const cid = ++s.catIdx;
  s.cats.push({ cid, title:'', brands:'' });
  rebuildSales(); render();
}

function delSale(id) {
  sales = sales.filter(s=>s.id!==id);
  rebuildSales(); render();
}

function addCat(saleId) {
  const s = sales.find(s=>s.id===saleId); if(!s) return;
  const cid = ++s.catIdx;
  s.cats.push({ cid, title:'', brands:'' });
  rebuildSales(); render();
}

function delCat(saleId, cid) {
  const s = sales.find(s=>s.id===saleId); if(!s) return;
  s.cats = s.cats.filter(c=>c.cid!==cid);
  rebuildSales(); render();
}

function loadSaleImg(input, id) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const s = sales.find(s=>s.id===id); if(!s) return;
      s.imgRaw = e.target.result; s.imgCropX=50; s.imgCropY=50; s.img=e.target.result;
      const isLandscape = img.width/img.height > 16/9+0.05;
      const isPortrait  = img.height/img.width > 9/16+0.05;
      const zone = document.getElementById('zone-sale'+id);
      zone.onclick = null;
      zone.innerHTML = `<div class="upl-filled"><img src="${e.target.result}" style="width:100%;max-height:120px;object-fit:cover;"/><button class="upl-remove" onclick="clearSaleImg(${id});event.stopPropagation()">✕</button></div>`;
      showSaleCrop(id, isPortrait, isLandscape);
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function showSaleCrop(id, portrait, landscape) {
  const wrap = document.getElementById('sale-crop-'+id);
  const rowY  = document.getElementById('sale-crop-y-'+id);
  const rowX  = document.getElementById('sale-crop-x-'+id);
  if(!wrap) return;
  wrap.style.display = (portrait||landscape)?'flex':'none';
  if(rowY) rowY.style.display = portrait?'flex':'none';
  if(rowX) rowX.style.display = landscape?'flex':'none';
  const sy=document.getElementById('sale-csy-'+id); if(sy) sy.value=50;
  const sx=document.getElementById('sale-csx-'+id); if(sx) sx.value=50;
  const ly=document.getElementById('sale-cly-'+id); if(ly) ly.textContent='50%';
  const lx=document.getElementById('sale-clx-'+id); if(lx) lx.textContent='50%';
}

function applySaleCrop(id, axis, val) {
  val = Math.max(0,Math.min(100,val));
  const s = sales.find(s=>s.id===id); if(!s) return;
  if(axis==='y') s.imgCropY=val; if(axis==='x') s.imgCropX=val;
  const label = document.getElementById(`sale-cl${axis}-${id}`);
  if(label) label.textContent=Math.round(val)+'%';
  render();
}

function clearSaleImg(id) {
  const s = sales.find(s=>s.id===id);
  if(s){ s.img=null; s.imgRaw=null; s.imgCropX=50; s.imgCropY=50; }
  const zone = document.getElementById('zone-sale'+id);
  zone.innerHTML = `<div class="upl-empty" style="padding:12px 10px"><div class="upl-icon">🖼</div><div class="upl-title">이미지 업로드</div><div class="upl-sub">가로형(16:9) 권장</div></div>`;
  zone.onclick = () => document.getElementById('file-sale'+id).click();
  showSaleCrop(id,false,false); render();
}

function getCroppedSaleCanvas(s) {
  return new Promise(resolve => {
    if(!s.imgRaw){ resolve(s.img); return; }
    const img = new Image();
    img.onload = () => {
      const targetRatio=16/9, srcRatio=img.width/img.height;
      let sw,sh,sx,sy;
      if(srcRatio>targetRatio){ sh=img.height; sw=Math.round(sh*targetRatio); sx=Math.round((img.width-sw)*(s.imgCropX||50)/100); sy=0; }
      else { sw=img.width; sh=Math.round(sw/targetRatio); sy=Math.round((img.height-sh)*(s.imgCropY||50)/100); sx=0; }
      const canvas=document.createElement('canvas'); canvas.width=780; canvas.height=439;
      canvas.getContext('2d').drawImage(img,sx,sy,sw,sh,0,0,780,439);
      resolve(canvas.toDataURL('image/jpeg',0.95));
    };
    img.src=s.imgRaw;
  });
}

function rebuildSales() {
  const list = document.getElementById('sale-list');
  list.innerHTML = '';
  sales.forEach((s, idx) => {
    const card = document.createElement('div');
    card.className = 'vcard';
    card.innerHTML = `
      <div class="vcard-head">
        <span class="vcard-label" style="background:#FFE5E7;color:#E60012">세일 ${idx+1}</span>
        <button class="vcard-del" onclick="delSale(${s.id})">✕</button>
      </div>
      <div class="vcard-body">
        <div class="field">
          <span class="field-label-ko">세일률 <span class="byte-counter" id="cnt-srate-${s.id}">0자/12자</span></span>
          <input type="text" id="srate-${s.id}" value="${s.rate}" placeholder="30%"
            oninput="sales.find(s=>s.id===${s.id}).rate=this.value;updateCharCount(this,'cnt-srate-${s.id}',12);render()"/>
        </div>
        <div class="field">
          <span class="field-label-ko">이미지 <span style="color:var(--tx-hint);font-weight:300;font-size:11px">· 선택 · 가로형(16:9) 권장</span></span>
          <div class="uploader" id="zone-sale${s.id}" onclick="document.getElementById('file-sale${s.id}').click()">
            ${s.img
              ? `<div class="upl-filled"><img src="${s.img}" style="width:100%;max-height:120px;object-fit:cover;"/><button class="upl-remove" onclick="clearSaleImg(${s.id});event.stopPropagation()">✕</button></div>`
              : `<div class="upl-empty" style="padding:12px 10px"><div class="upl-icon">🖼</div><div class="upl-title">이미지 업로드</div><div class="upl-sub">가로형(16:9) 권장</div></div>`}
          </div>
          <input type="file" id="file-sale${s.id}" accept="image/*" onchange="loadSaleImg(this,${s.id})"/>
          <div id="sale-crop-${s.id}" style="display:none;flex-direction:column;gap:8px;margin-top:6px;padding:10px 12px;background:#F5F4EF;border-radius:8px;border:1px solid var(--border)">
            <span style="font-size:11px;font-weight:600;color:var(--tx-mid)">📐 크롭 위치 조정</span>
            <div id="sale-crop-y-${s.id}" style="display:none;align-items:center;gap:8px">
              <span style="font-size:10px;color:var(--tx-mid);width:28px;flex-shrink:0">상하</span>
              <span style="font-size:10px;color:var(--tx-hint)">위</span>
              <input type="range" id="sale-csy-${s.id}" min="0" max="100" value="50" step="1" style="flex:1;accent-color:var(--accent)" oninput="applySaleCrop(${s.id},'y',parseInt(this.value))"/>
              <span style="font-size:10px;color:var(--tx-hint)">아래</span>
              <span id="sale-cly-${s.id}" style="font-size:10px;color:var(--tx-light);font-family:monospace;width:28px;text-align:right">50%</span>
            </div>
            <div id="sale-crop-x-${s.id}" style="display:none;align-items:center;gap:8px">
              <span style="font-size:10px;color:var(--tx-mid);width:28px;flex-shrink:0">좌우</span>
              <span style="font-size:10px;color:var(--tx-hint)">좌</span>
              <input type="range" id="sale-csx-${s.id}" min="0" max="100" value="50" step="1" style="flex:1;accent-color:var(--accent)" oninput="applySaleCrop(${s.id},'x',parseInt(this.value))"/>
              <span style="font-size:10px;color:var(--tx-hint)">우</span>
              <span id="sale-clx-${s.id}" style="font-size:10px;color:var(--tx-light);font-family:monospace;width:28px;text-align:right">50%</span>
            </div>
          </div>
        </div>
        <div class="field">
          <span class="field-label-ko">카테고리 <span class="byte-counter">${s.cats.length}개</span></span>
          <div class="vcard-list" id="cat-list-${s.id}">${buildCatCards(s)}</div>
          <button class="add-card-btn" style="margin-top:8px" onclick="addCat(${s.id})">
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            카테고리 추가
          </button>
        </div>
      </div>`;
    list.appendChild(card);
  });
  document.getElementById('sale-cnt').textContent = sales.length + '개';
}

function buildCatCards(s) {
  return s.cats.map((c, ci) => `
    <div class="vcard" style="background:#fff">
      <div class="vcard-head" style="background:#fff">
        <span class="vcard-label" style="background:#EDEDED;color:#555">카테고리 ${ci+1}</span>
        <button class="vcard-del" onclick="delCat(${s.id},${c.cid})">✕</button>
      </div>
      <div class="vcard-body">
        <div class="field">
          <span class="field-label-ko">카테고리 타이틀 <span class="byte-counter" id="cnt-ctitle-${s.id}-${c.cid}">0자/30자</span></span>
          <input type="text" id="ctitle-${s.id}-${c.cid}" value="${c.title}" placeholder="Women's Fashion"
            oninput="setCat(${s.id},${c.cid},'title',this.value);updateCharCount(this,'cnt-ctitle-${s.id}-${c.cid}',30);render()"/>
        </div>
        <div class="field">
          <span class="field-label-ko">브랜드 목록 <span style="color:var(--tx-hint);font-weight:300;font-size:11px">· 회색 텍스트</span></span>
          <textarea rows="4" id="cbrands-${s.id}-${c.cid}" placeholder="라코스테우먼, 로렌랄프로렌, 빈폴레이디스(6.19~), 타미힐피거 여성"
            oninput="setCat(${s.id},${c.cid},'brands',this.value);render()">${c.brands}</textarea>
        </div>
      </div>
    </div>`).join('');
}

function setCat(saleId, cid, key, val) {
  const s = sales.find(s=>s.id===saleId); if(!s) return;
  const c = s.cats.find(c=>c.cid===cid); if(!c) return;
  c[key] = val;
}

// ─── RENDER ──────────────────────────────────────────────────
function v(id) { const el=document.getElementById(id); return el?el.value.trim():''; }

function render() {
  const t1=v('f-t1'), t2=v('f-t2'), desc=v('f-desc');
  const period=v('f-period'), loc=v('f-loc'), notes=v('f-notes');

  let h = '';

  // 헤더
  h += `<div class="o-hd" style="background:${headerGradient(headerBg)}">`;
  if (t1) h += `<div class="o-hd-t1" style="color:#FFFFFF">${t1}</div>`;
  h += `<div class="o-hd-t2" style="color:#FFFFFF">${t2||'SALE'}</div>`;
  if (desc) h += `<div class="o-hd-desc" style="color:rgba(255,255,255,0.82)">${desc.replace(/\n/g,'<br>')}</div>`;
  if (period || loc) {
    h += `<div class="o-hd-meta">`;
    if (period) h += `<div class="o-hd-row"><span class="o-hd-key" style="color:rgba(255,255,255,0.6)">기간</span><span class="o-hd-val" style="color:#FFFFFF">${period}</span></div>`;
    if (loc)    h += `<div class="o-hd-row"><span class="o-hd-key" style="color:rgba(255,255,255,0.6)">장소</span><span class="o-hd-val" style="color:#FFFFFF">${loc}</span></div>`;
    h += `</div>`;
  }
  h += `</div>`;

  // SALE 정보
  if (sales.length > 0) {
    h += `<div class="o-sale">`;
    sales.forEach((s, idx) => {
      if (idx > 0) h += `<div class="o-sale-divider"></div>`;
      h += `<div class="o-sale-item">`;
      if (s.rate) h += `<div class="o-sale-rate">${s.rate}</div>`;
      if (s.img) {
        h += `<div class="o-sale-img-wrap"><img src="${s.img}" class="o-sale-img" style="object-position:${s.imgCropX||50}% ${s.imgCropY||50}%"/></div>`;
      }
      (s.cats||[]).forEach(c => {
        if (!c.title && !c.brands) return;
        h += `<div class="o-sale-cat">`;
        if (c.title)  h += `<div class="o-sale-cat-title">${c.title}</div>`;
        if (c.brands) h += `<div class="o-sale-cat-brands">${c.brands.replace(/\n/g,'<br>')}</div>`;
        h += `</div>`;
      });
      h += `</div>`;
    });
    h += `</div>`;
  }

  // 참고사항
  if (notes) {
    h += `<div class="o-notes">`;
    h += `<div class="o-notes-ttl">참고사항</div>`;
    h += `<div class="o-notes-txt">${notes.replace(/\n/g,'<br>')}</div>`;
    h += `</div>`;
  } else {
    // 참고사항이 없어도 하단이 넉넉해 보이도록 여백 확보
    h += `<div style="height:56px"></div>`;
  }

  document.getElementById('output').innerHTML = h;
}

// ─── CHAR COUNTER ────────────────────────────────────────────
function updateCharCount(input, counterId, max) {
  const counter = document.getElementById(counterId); if (!counter) return;
  if (input.value.length > max) input.value = input.value.slice(0, max);
  const len = input.value.length;
  counter.textContent = `${len}자/${max}자`;
  counter.classList.toggle('over', len >= max);
}

// ─── SAVE CODE ───────────────────────────────────────────────
function generateSaveCode() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  const arr = new Uint8Array(6); crypto.getRandomValues(arr);
  let code = 'SALE-';
  for (let i=0;i<6;i++) code += chars[arr[i]%36];
  return code;
}

// ─── COLLECT / RESTORE ───────────────────────────────────────
function collectFormData() {
  return {
    t1: v('f-t1'), t2: v('f-t2'), desc: v('f-desc'),
    period: v('f-period'), loc: v('f-loc'),
    headerBg: headerBg, notes: v('f-notes'),
    sales: sales.map(s=>({ rate:s.rate, cats:(s.cats||[]).map(c=>({ title:c.title, brands:c.brands })) }))
  };
}

function restoreFormData(data) {
  const set = (id, val) => { const el=document.getElementById(id); if(el) el.value=val||''; };
  set('f-t1', data.t1); set('f-t2', data.t2); set('f-desc', data.desc);
  set('f-period', data.period); set('f-loc', data.loc); set('f-notes', data.notes);
  if (data.headerBg) applyColor(data.headerBg, '', '');
  sales=[]; saleIdx=0;
  (data.sales||[]).forEach(s=>{
    const id=++saleIdx;
    const sale={id,img:null,imgRaw:null,imgCropX:50,imgCropY:50,rate:s.rate,catIdx:0,cats:[]};
    // 구버전 호환: brands 단일 필드
    const cats = s.cats || (s.brands!==undefined ? [{title:'',brands:s.brands}] : []);
    (cats.length?cats:[{title:'',brands:''}]).forEach(c=>{ const cid=++sale.catIdx; sale.cats.push({cid,title:c.title||'',brands:c.brands||''}); });
    sales.push(sale);
  });
  rebuildSales();
  render();
}

// ─── LOAD ────────────────────────────────────────────────────
async function doLoad() {
  const codeInput=document.getElementById('load-code'), btn=document.getElementById('load-btn');
  const code=codeInput.value.trim(); if(!code) return;
  btn.textContent='불러오는 중...'; btn.disabled=true;
  try {
    const res=await fetch(APPS_SCRIPT_URL+'?action=load&code='+encodeURIComponent(code));
    const result=await res.json();
    if(result.status==='ok'){ try{ restoreFormData(JSON.parse(result.data)); showToast('✓ 불러오기 완료'); }catch(e){ showToast('⚠ 데이터 형식 오류'); } }
    else if(result.status==='not_found') showToast('해당 코드의 저장 데이터가 없습니다');
    else showToast('⚠ 불러오기 실패');
  } catch(e){ showToast('불러오기 실패. 네트워크를 확인해 주세요'); }
  btn.textContent='불러오기'; btn.disabled=false;
}

// ─── TEMP SAVE ───────────────────────────────────────────────
async function doTempSave() {
  const btn=document.getElementById('tmpbtn');
  btn.disabled=true; btn.textContent='저장 중...';
  const code=generateSaveCode();
  try {
    const res=await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'save',code,type:'sale',data:JSON.stringify(collectFormData())})});
    const result=await res.json();
    if(result.status==='ok') showSaveModal(code); else showToast('⚠ 임시저장 실패');
  } catch(e){ showToast('⚠ 임시저장 실패'); }
  btn.disabled=false; btn.textContent='임시저장';
}

// ─── EXPORT ──────────────────────────────────────────────────
async function doExport() {
  const btn=document.getElementById('expbtn');
  btn.disabled=true;
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M3.5 5.5L7 9l3.5-3.5M1 11.5h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> 생성 중...`;
  try {
    await document.fonts.ready;

    // 크롭 이미지 교체
    const croppedMap = {};
    for (const s of sales) { if(s.imgRaw) croppedMap['sale-'+s.id]=await getCroppedSaleCanvas(s); }
    const saleImgs = document.querySelectorAll('#output .o-sale-img');
    const origSrcs = [];
    saleImgs.forEach((el,i)=>{ origSrcs.push({el,src:el.src,style:el.getAttribute('style')}); const k='sale-'+sales[i]?.id; if(k&&croppedMap[k]){el.src=croppedMap[k];el.style.objectPosition='center';} });

    const canvas=await html2canvas(document.getElementById('output'),{scale:3,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',scrollX:0,scrollY:0,width:390,windowWidth:390,logging:false});
    origSrcs.forEach(({el,src,style})=>{ el.src=src; if(style) el.setAttribute('style',style); else el.removeAttribute('style'); });

    const code=generateSaveCode();
    const name=(v('f-t1')+' '+v('f-t2')).trim()||'SALE';
    const fname=`[SALE] ${name}_${code}`.replace(/[<>:"/\\|?*]/g,'_').slice(0,60)+'.jpg';
    canvas.toBlob(blob=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fname; a.click(); },'image/jpeg',0.95);
    try {
      const res=await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'save',code,type:'sale',data:JSON.stringify(collectFormData())})});
      const result=await res.json();
      if(result.status==='ok') showSaveModal(code); else showToast('⚠ 저장 실패');
    } catch(e){ showToast('⚠ 저장 실패'); }
  } catch(e){ showToast('⚠ 내보내기 실패: '+e.message); }
  btn.disabled=false;
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M3.5 5.5L7 9l3.5-3.5M1 11.5h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> JPG 내보내기`;
}

// ─── MODAL / TOAST ───────────────────────────────────────────
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
let lastSavedCode='';
function showSaveModal(code){ lastSavedCode=code; document.getElementById('save-modal-code').textContent=code; document.getElementById('save-modal').classList.add('show'); }
function closeSaveModal(e){ if(e&&e.target!==e.currentTarget)return; document.getElementById('save-modal').classList.remove('show'); }
async function copySaveCode(){ try{ await navigator.clipboard.writeText(lastSavedCode); showToast('✓ 코드가 클립보드에 복사되었습니다'); }catch(e){ showToast('⚠ 복사 실패'); } }
function openExample(){ document.getElementById('ex-modal').classList.add('show'); }
function closeExample(e){ if(e&&e.target!==e.currentTarget)return; document.getElementById('ex-modal').classList.remove('show'); }

// ─── RESET ───────────────────────────────────────────────────
function resetAll() {
  ['f-t1','f-t2','f-desc','f-period','f-loc','f-notes'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  sales=[]; saleIdx=0; rebuildSales();
  applyColor('#E60012', 0, '레드');
  render();
}

// ─── INIT ────────────────────────────────────────────────────
buildSwatches();
render();
</script>
</body>
