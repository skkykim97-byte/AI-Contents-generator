<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>팝업 행사 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/fonts.css">
<style>
/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#C8102E;
  --accent-bg:#FFF1F3;
  --page:#F2F1EC;
  --white:#FFFFFF;
  --border:#DDDBD3;
  --border-md:#C9C7BF;
  --tx-dark:#181816;
  --tx-mid:#6B6B66;
  --tx-light:#AEADA7;
  --tx-hint:#C8C7C0;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
  --fn:'MaisonNeue','Noto Sans KR',sans-serif;
  --form-w:420px;
}
body{
  font-family:var(--fn);
  background:var(--page);
  color:var(--tx-dark);
  font-size:14px;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.topbar{
  height:54px;
  background:var(--white);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 24px;
  gap:14px;
  flex-shrink:0;
  z-index:100;
}
.tb-logo{display:flex;align-items:center;gap:10px}
.tb-badge{
  font-size:10px;font-weight:700;
  letter-spacing:.6px;
  padding:4px 9px;border-radius:5px;
  background:var(--accent);color:#fff;
  text-transform:uppercase;
}
.tb-name{font-size:14px;font-weight:700;color:var(--tx-dark);letter-spacing:-.3px}
.tb-desc{font-size:12px;color:var(--tx-light);flex:1;letter-spacing:-.1px}
.tb-divider{width:1px;height:22px;background:var(--border)}
.tb-btn{
  height:34px;padding:0 16px;
  border-radius:var(--radius-sm);
  font-size:12px;font-weight:700;
  font-family:var(--fn);
  cursor:pointer;border:none;
  display:flex;align-items:center;gap:6px;
  transition:all .15s;letter-spacing:-.1px;
}
.tb-btn-ghost{background:transparent;border:1px solid var(--border);color:var(--tx-mid)}
.tb-btn-ghost:hover{border-color:var(--border-md);color:var(--tx-dark);background:#FAFAF7}
.tb-btn-fill{background:var(--tx-dark);color:#fff}
.tb-btn-fill:hover{background:#2A2A28}
.tb-btn-fill:disabled{background:#C0BFB8;cursor:not-allowed}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.layout{display:flex;flex:1;overflow:hidden}

/* ═══════════════════════════════════════════
   FORM PANEL
═══════════════════════════════════════════ */
.form-panel{
  width:var(--form-w);
  min-width:var(--form-w);
  background:var(--page);
  border-right:1px solid var(--border);
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.form-panel::-webkit-scrollbar{width:4px}
.form-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.form-body{padding:20px;display:flex;flex-direction:column;gap:6px}

/* 섹션 카드 */
.sec{
  background:var(--white);
  border-radius:var(--radius-lg);
  border:1px solid var(--border);
  overflow:hidden;
}
.sec-header{
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--border);
  background:var(--white);
}
.sec-num{
  width:26px;height:26px;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
  flex-shrink:0;
}
.sec-title{flex:1;font-size:13px;font-weight:700;color:var(--tx-dark);letter-spacing:-.2px}
.sec-tag{
  font-size:10px;font-weight:700;
  color:var(--tx-light);
  background:var(--page);
  border:1px solid var(--border);
  padding:3px 8px;border-radius:20px;
  letter-spacing:.2px;
}
.sec-body{padding:18px;display:flex;flex-direction:column;gap:14px}

/* 폼 필드 */
.field{display:flex;flex-direction:column;gap:6px}
.field-label{
  font-size:11px;font-weight:700;
  color:var(--tx-mid);
  letter-spacing:.3px;
  text-transform:uppercase;
}
.field-label-ko{
  font-size:12px;font-weight:500;
  color:var(--tx-mid);
}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

input[type=text],textarea{
  width:100%;
  padding:9px 12px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:13px;
  font-family:var(--fn);
  font-weight:400;
  color:var(--tx-dark);
  background:#fff;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
  line-height:1.6;
  letter-spacing:-.1px;
}
input[type=text]:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(200,16,46,.08);
}
input::placeholder,textarea::placeholder{color:var(--tx-hint);font-weight:300}
textarea{resize:vertical;min-height:72px}

/* 헤더 색상 피커 */
.color-section{display:flex;flex-direction:column;gap:10px}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap}
.cswatch{
  width:32px;height:32px;
  border-radius:8px;
  cursor:pointer;
  position:relative;
  transition:transform .12s;
  flex-shrink:0;
}
.cswatch:hover{transform:scale(1.1)}
.cswatch.active::after{
  content:'';
  position:absolute;
  inset:-3px;
  border-radius:11px;
  border:2px solid var(--tx-dark);
}
.cswatch.white-swatch{border:1.5px solid var(--border)}
.color-custom-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;
  background:var(--page);
  border-radius:var(--radius-sm);
  border:1.5px solid var(--border);
  cursor:pointer;
  transition:border-color .15s;
}
.color-custom-row:hover{border-color:var(--border-md)}
.color-dot-preview{
  width:22px;height:22px;
  border-radius:6px;
  border:1px solid rgba(0,0,0,.08);
  flex-shrink:0;
  transition:background .15s;
}
.color-hex-display{
  font-size:12px;font-family:monospace;
  font-weight:500;color:var(--tx-mid);
  flex:1;letter-spacing:.5px;
}
.color-edit-icon{color:var(--tx-hint)}
input[type=color]{position:absolute;opacity:0;width:0;height:0;pointer-events:none}

/* 이미지 업로더 */
.uploader{
  border:1.5px dashed var(--border);
  border-radius:var(--radius-md);
  cursor:pointer;
  overflow:hidden;
  transition:border-color .15s,background .15s;
  background:#FAFAF7;
}
.uploader:hover{
  border-color:var(--accent);
  background:#FFF7F8;
}
.upl-empty{
  padding:18px 12px;
  display:flex;flex-direction:column;
  align-items:center;gap:6px;
  text-align:center;
}
.upl-icon{
  width:36px;height:36px;
  border-radius:10px;
  background:var(--page);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  border:1px solid var(--border);
}
.upl-title{font-size:12px;font-weight:700;color:var(--tx-mid)}
.upl-sub{font-size:11px;color:var(--tx-hint);font-weight:300}
.upl-filled{position:relative}
.upl-filled img{
  width:100%;display:block;
  max-height:160px;object-fit:cover;
  border-radius:calc(var(--radius-md) - 2px);
}
.upl-remove{
  position:absolute;top:8px;right:8px;
  width:26px;height:26px;border-radius:50%;
  background:rgba(18,18,16,.6);
  color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
  transition:background .15s;
  backdrop-filter:blur(4px);
}
.upl-remove:hover{background:rgba(200,16,46,.8)}
input[type=file]{display:none}

/* 가변 아이템 카드 */
.vcard-list{display:flex;flex-direction:column;gap:8px}
.vcard{
  background:var(--page);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  overflow:hidden;
}
.vcard-head{
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
  background:#FAFAF7;
}
.vcard-label{
  font-size:11px;font-weight:700;
  letter-spacing:.3px;
  padding:3px 9px;border-radius:20px;
  flex:1;
}
.vcard-del{
  width:26px;height:26px;
  border-radius:6px;
  background:transparent;
  border:1px solid var(--border);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--tx-light);
  font-size:11px;font-weight:700;
  transition:all .12s;
  line-height:1;
}
.vcard-del:hover{border-color:#E55;color:#E55;background:#FFF2F2}
.vcard-body{padding:14px;display:flex;flex-direction:column;gap:11px}

.add-card-btn{
  width:100%;
  padding:10px;
  border:1.5px dashed var(--border);
  border-radius:var(--radius-md);
  background:transparent;
  cursor:pointer;
  font-size:12px;font-weight:700;
  color:var(--tx-light);
  font-family:var(--fn);
  transition:all .15s;
  letter-spacing:-.1px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.add-card-btn:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--accent-bg);
}

/* ═══════════════════════════════════════════
   PREVIEW PANEL
═══════════════════════════════════════════ */
.preview-panel{
  flex:1;
  overflow-y:auto;
  background:#B8B6AD;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:32px 24px 48px;
  gap:0;
}
.preview-chip{
  font-size:9px;font-weight:700;
  letter-spacing:2px;
  color:rgba(255,255,255,.45);
  text-transform:uppercase;
  margin-bottom:16px;
  font-family:var(--fn);
}
.preview-frame{
  width:390px;
  background:#fff;
  box-shadow:
    0 0 0 1px rgba(0,0,0,.06),
    0 24px 80px rgba(0,0,0,.22),
    0 8px 24px rgba(0,0,0,.12);
  border-radius:2px;
}

/* ═══════════════════════════════════════════
   CONTENT OUTPUT — 원본 완전 재현
   MaisonNeue (영문·숫자) + Noto Sans KR (한글)
═══════════════════════════════════════════ */
#output{
  width:390px;
  background:#fff;
  font-family:'MaisonNeue','Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* 헤더 */
.o-hd{padding:44px 24px 40px}
.o-hd-brand{
  font-size:11.5px;font-weight:400;
  letter-spacing:.2px;
  margin-bottom:2px;line-height:1.4;
}
.o-hd-title{
  font-size:19px;font-weight:500;
  letter-spacing:-.5px;
  line-height:1.35;
  margin-bottom:10px;
  word-break:keep-all;
}
.o-hd-meta{display:flex;flex-direction:column;gap:5px}
.o-hd-row{display:flex;align-items:baseline;font-size:13px;font-weight:300;gap:0}
.o-hd-key{width:28px;flex-shrink:0;font-weight:300}
.o-hd-val{flex:1;line-height:1.5;word-break:keep-all;font-weight:300}

/* 대표 이미지 */
.o-hero img{width:390px;display:block}
.o-hero-ph{
  width:390px;height:200px;
  background:#EDECEA;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#C0BFB8;
  font-family:'MaisonNeue','Noto Sans KR',sans-serif;
  font-weight:300;
}

/* 소개 */
.o-intro{
  padding:26px 24px;
  border-bottom:1px solid #E8E6DF;
}
.o-intro p{
  font-size:13px;font-weight:400;
  color:#2E2E2C;line-height:1.6;
  word-break:keep-all;
}
.o-intro p+p{margin-top:16px}

/* 섹션 타이틀 */
.o-sec{
  padding:22px 20px 8px;
  display:flex;align-items:center;gap:12px;
}
.o-sec-txt{
  font-size:14px;font-weight:700;
  color:#111;letter-spacing:.3px;
  white-space:nowrap;
}
.o-sec-line{flex:1;height:1px;background:#E2E0D9}

/* Item */
.o-item{
  display:flex;align-items:flex-start;
  gap:14px;padding:18px 20px;
  border-bottom:1px solid #EDECEA;
}
.o-item-img{
  width:130px;height:130px;
  object-fit:cover;
  flex-shrink:0;display:block;
  background:#EDECEA;
}
.o-item-img-ph{
  width:130px;height:130px;
  flex-shrink:0;background:#EDECEA;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#C0BFB8;
  font-family:'MaisonNeue','Noto Sans KR',sans-serif;font-weight:300;
}
.o-item-info{flex:1;min-width:0;padding-top:3px}
.o-item-name{
  font-size:13.5px;font-weight:700;
  color:#111;line-height:1.45;
  margin-bottom:5px;word-break:keep-all;
}
.o-item-price{
  font-size:15.5px;font-weight:700;
  color:#111;margin-bottom:9px;letter-spacing:-.3px;
}
.o-item-desc{
  font-size:11.5px;font-weight:400;
  color:#8A8A84;line-height:1.75;
  word-break:keep-all;
}

/* Special Benefit */
.o-bn{
  display:flex;align-items:flex-start;
  gap:12px;padding:16px 20px;
  border-bottom:1px solid #EDECEA;
}
.o-bn-num{
  width:22px;height:22px;border-radius:50%;
  background:#18181A;color:#fff;
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:4px;
  font-family:'MaisonNeue','Noto Sans KR',sans-serif;
}
.o-bn-img{
  width:80px;height:80px;
  object-fit:cover;display:block;
  flex-shrink:0;background:#EDECEA;
}
.o-bn-img-ph{
  width:80px;height:80px;
  flex-shrink:0;background:#EDECEA;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#C0BFB8;
  font-family:'MaisonNeue','Noto Sans KR',sans-serif;font-weight:300;
}
.o-bn-txt{flex:1;min-width:0;padding-top:4px}
.o-bn-cond{
  font-size:12px;font-weight:300;
  color:#888;line-height:1.55;
  margin-bottom:4px;word-break:keep-all;
}
.o-bn-gift{
  font-size:13px;font-weight:700;
  color:#111;line-height:1.55;
  word-break:keep-all;
}

/* 유의사항 */
.o-notes{
  padding:18px 20px 28px;
  background:#F6F5EF;
}
.o-notes-ttl{
  font-size:11px;font-weight:700;
  color:#8A8A84;
  letter-spacing:1.2px;
  text-transform:uppercase;
  margin-bottom:10px;
  font-family:'MaisonNeue','Noto Sans KR',sans-serif;
}
.o-notes-txt{
  font-size:12px;font-weight:300;
  color:#6B6B66;line-height:1.95;
  white-space:pre-wrap;word-break:keep-all;
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%);
  background:#18181A;color:#fff;
  padding:10px 20px;border-radius:8px;
  font-size:12px;font-weight:500;
  opacity:0;transition:opacity .25s;
  pointer-events:none;z-index:9999;
  white-space:nowrap;font-family:var(--fn);
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.toast.show{opacity:1}

/* ═══════════════════════════════════════════
   LOAD BAR
═══════════════════════════════════════════ */
.load-bar{
  display:flex;
  gap:8px;
  align-items:center;
  padding:14px 16px;
  background:var(--white);
  border-radius:var(--radius-lg);
  border:1px solid var(--border);
}
.load-bar input{
  flex:1;
  padding:9px 12px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:13px;
  font-family:var(--fn);
  font-weight:500;
  color:var(--tx-dark);
  letter-spacing:.5px;
  outline:none;
  transition:border-color .15s;
}
.load-bar input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(200,16,46,.08);
}
.load-bar input::placeholder{color:var(--tx-hint);font-weight:300}
.load-bar button{
  height:38px;
  padding:0 18px;
  border-radius:var(--radius-sm);
  font-size:12px;
  font-weight:700;
  font-family:var(--fn);
  cursor:pointer;
  border:1px solid var(--border);
  background:var(--white);
  color:var(--tx-mid);
  transition:all .15s;
  white-space:nowrap;
}
.load-bar button:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--accent-bg);
}
.load-bar button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

/* ═══════════════════════════════════════════
   SAVE MODAL
═══════════════════════════════════════════ */
.save-modal-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  z-index:10000;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(2px);
}
.save-modal-overlay.show{display:flex}
.save-modal{
  background:#fff;
  border-radius:16px;
  padding:36px 32px 28px;
  width:340px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  animation:modalIn .2s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.save-modal-icon{
  font-size:36px;
  margin-bottom:12px;
  color:#2A8847;
}
.save-modal-title{
  font-size:18px;font-weight:700;
  color:var(--tx-dark);
  margin-bottom:16px;
}
.save-modal-code{
  font-size:22px;font-weight:700;
  font-family:monospace;
  letter-spacing:2px;
  color:var(--accent);
  background:var(--accent-bg);
  padding:12px 20px;
  border-radius:10px;
  margin-bottom:16px;
  user-select:all;
}
.save-modal-msg{
  font-size:12px;
  color:var(--tx-mid);
  line-height:1.7;
  margin-bottom:20px;
}
.save-modal-copy{
  width:100%;
  padding:11px;
  border:none;
  border-radius:var(--radius-sm);
  background:var(--tx-dark);
  color:#fff;
  font-size:13px;font-weight:700;
  font-family:var(--fn);
  cursor:pointer;
  margin-bottom:8px;
  transition:background .15s;
}
.save-modal-copy:hover{background:#2A2A28}
.save-modal-close{
  width:100%;
  padding:10px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:transparent;
  color:var(--tx-mid);
  font-size:12px;font-weight:500;
  font-family:var(--fn);
  cursor:pointer;
  transition:all .15s;
}
.save-modal-close:hover{background:var(--page)}
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="tb-logo">
    <span class="tb-badge">팝업행사</span>
    <span class="tb-name">점별 팝업 행사 생성기</span>
  </div>
  <div class="tb-divider"></div>
  <span class="tb-desc">JPG 내보내기</span>
  <button class="tb-btn tb-btn-ghost" onclick="resetAll()">초기화</button>
  <button class="tb-btn tb-btn-fill" id="expbtn" onclick="doExport()">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v8M3.5 5.5L7 9l3.5-3.5M1 11.5h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    JPG 내보내기
  </button>
</div>

<!-- ── MAIN ── -->
<div class="layout">

  <!-- FORM -->
  <div class="form-panel">
    <div class="form-body">

      <!-- Load Dialog -->
      <div class="load-bar">
        <input type="text" id="load-code" placeholder="POP-XXXXXX" maxlength="10" />
        <button id="load-btn" onclick="doLoad()">불러오기</button>
      </div>

      <!-- 1. 행사 기본 정보 -->
      <div class="sec">
        <div class="sec-header">

            placeholder="※ 이벤트는 사전 예고 없이 변경되거나 조기 종료될 수 있습니다&#10;※ 혜택은 1인 1회 제공됩니다"
            oninput="render()"></textarea>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ─── COLOR SYSTEM ─────────────────────────────────────────────
const PRESETS = [
  { h:'#FFFFFF', n:'화이트', white:true },
  { h:'#18181A', n:'블랙' },
  { h:'#C8102E', n:'레드' },
  { h:'#1B2A4A', n:'네이비' },
  { h:'#2A4438', n:'딥그린' },
  { h:'#F5F0E6', n:'아이보리', light:true },
  { h:'#EAE0CC', n:'베이지', light:true },
  { h:'#3C3858', n:'딥퍼플' },
  { h:'#3A3A3A', n:'차콜' },
];

let headerBg = '#FFFFFF';
let headerTx = '#18181A';
let headerMuted = 'rgba(0,0,0,0.35)';

function getLuminance(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return 0.299*r + 0.587*g + 0.114*b;
}

function applyColor(hex, idx, name) {
  headerBg = hex;
  const lum = getLuminance(hex);
  headerTx = lum > 0.42 ? '#18181A' : '#FFFFFF';
  headerMuted = lum > 0.42 ? 'rgba(0,0,0,0.35)' : 'rgba(255,255,255,0.5)';
  // 피커 업데이트
  const dot = document.getElementById('cdot-preview');
  if (dot) {
    dot.style.background = hex;
    dot.style.border = (hex === '#FFFFFF' || lum > 0.85) ? '1.5px solid #DDD' : '1px solid rgba(0,0,0,.06)';
  }
  const hexEl = document.getElementById('chex');
  if (hexEl) hexEl.textContent = hex.toUpperCase();
  const picker = document.getElementById('cpicker');
  if (picker) picker.value = hex;
  // 스와치 active 상태
  document.querySelectorAll('.cswatch').forEach(s => s.classList.remove('active'));
  if (idx !== '') {
    const sw = document.getElementById('sw-'+idx);
    if (sw) sw.classList.add('active');
  }
  render();
}

function buildSwatches() {
  const row = document.getElementById('swatch-row');
  PRESETS.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'cswatch' + (i === 0 ? ' active' : '') + (p.white ? ' white-swatch' : '');
    d.id = 'sw-' + i;
    d.style.background = p.h;
    d.title = p.n;
    d.onclick = () => applyColor(p.h, i, p.n);
    row.appendChild(d);
  });
  applyColor('#FFFFFF', 0, '화이트');
}

// ─── IMAGE ────────────────────────────────────────────────────
const imgStore = { hero: null };

function loadImg(input, key) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgStore[key] = e.target.result;
    renderUploaderFilled('hero-zone', e.target.result, 'hero');
    render();
  };
  reader.readAsDataURL(file);
}

function loadItemImg(input, id) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const it = items.find(i => i.id === id);
    if (it) it.img = e.target.result;
    renderUploaderFilled('zone-it'+id, e.target.result, 'it'+id);
    render();
  };
  reader.readAsDataURL(file);
}

function loadBnImg(input, id) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const bn = bns.find(b => b.id === id);
    if (bn) bn.img = e.target.result;
    renderUploaderFilled('zone-bn'+id, e.target.result, 'bn'+id);
    render();
  };
  reader.readAsDataURL(file);
}

function renderUploaderFilled(zoneId, src, clearKey) {
  const zone = document.getElementById(zoneId);
  if (!zone) return;
  zone.onclick = null;
  zone.innerHTML = `<div class="upl-filled">
    <img src="${src}" />
    <button class="upl-remove" onclick="clearUpload('${clearKey}');event.stopPropagation()">✕</button>
  </div>`;
}

function clearUpload(key) {
  if (key === 'hero') {
    imgStore.hero = null;
    const z = document.getElementById('hero-zone');
    z.innerHTML = `<div class="upl-empty"><div class="upl-icon">🖼</div><div class="upl-title">클릭하여 이미지 업로드</div><div class="upl-sub">JPG · PNG · WEBP</div></div>`;
    z.onclick = () => document.getElementById('hero-file').click();
  } else if (key.startsWith('it')) {
    const id = parseInt(key.slice(2));
    const it = items.find(i => i.id === id);
    if (it) it.img = null;
    restoreZone('zone-it'+id, '상품 이미지', 'file-it'+id, false);
  } else if (key.startsWith('bn')) {
    const id = parseInt(key.slice(2));
    const bn = bns.find(b => b.id === id);
    if (bn) bn.img = null;
    restoreZone('zone-bn'+id, '혜택 이미지', 'file-bn'+id, true);
  }
  render();
}

function restoreZone(zoneId, label, fileId, small) {
  const z = document.getElementById(zoneId);
  if (!z) return;
  z.innerHTML = `<div class="upl-empty" style="${small?'padding:12px 10px':''}">
    <div class="upl-icon">🖼</div>
    <div class="upl-title">${label}</div>
    <div class="upl-sub">클릭하여 선택</div>
  </div>`;
  z.onclick = () => document.getElementById(fileId).click();
}

// ─── STATE ────────────────────────────────────────────────────
let items = [], bns = [], iIdx = 0, bIdx = 0;

const ITEM_EX = [
  { name:'플뢰리에 네롤리 이리야 EDP 75ml', price:'318,000원', desc:'한 송이 꽃향을 떠올리게 하는 시트러스와 그린의 조화.\n신선하고 에너제틱한 향기의 매혹적인 향수입니다.' },
  { name:'플뢰리에 떼 이마라 EDP 75ml', price:'380,000원', desc:'부드럽고 고혹적인 꽃잎의 잔향, 우아한 우드 베이스가\n오래도록 지속되는 깊은 향수' },
  { name:'상탈 봉봉 프 레장 75ml', price:'', desc:'달콤한 바닐라와 따뜻한 샌달우드가 어우러진\n안락하고 감각적인 향' },
  { name:'레 클레마시크 컬렉션 100ml', price:'427,000원', desc:'우아하고 고급스러운 플로럴 무스크 향.\n클래식 콜렉션 라인의 대표 향수' },
];
const BN_EX = [
  { cond:'행사 SNS 이벤트 참여 시', gift:'2ml 바이알 1개 증정' },
  { cond:'모든 구매 고객', gift:'2ml 바이알 3종 슬리브 세트 증정' },
  { cond:'40만원 이상 구매 시', gift:'75ml 미니어처 추가 증정' },
  { cond:'50만원 이상 구매 시', gift:'75ml × 3 디스커버리 세트 추가 증정' },
  { cond:'캘리그래피 & 플라워 드로잉 카드 이벤트', gift:'참여 고객 기념 엽서 제공' },
];

function addItem() {
  const id = ++iIdx;
  const ex = ITEM_EX[items.length] || { name:'', price:'', desc:'' };
  items.push({ id, img: null, name: ex.name, price: ex.price, desc: ex.desc });
  rebuildItems();
  render();
}
function delItem(id) {
  items = items.filter(i => i.id !== id);
  rebuildItems();
  render();
}

function rebuildItems() {
  const list = document.getElementById('items-list');
  list.innerHTML = '';
  items.forEach((it, idx) => {
    const card = document.createElement('div');
    card.className = 'vcard';
    card.innerHTML = `
      <div class="vcard-head">
        <span class="vcard-label" style="background:#EEF9F1;color:#2A8847">Item ${idx+1}</span>
        <button class="vcard-del" onclick="delItem(${it.id})">✕</button>
      </div>
      <div class="vcard-body">
        <div class="field">
          <span class="field-label-ko">상품 이미지</span>
          <div class="uploader" id="zone-it${it.id}" onclick="document.getElementById('file-it${it.id}').click()">
            ${it.img
              ? `<div class="upl-filled"><img src="${it.img}"/><button class="upl-remove" onclick="clearUpload('it${it.id}');event.stopPropagation()">✕</button></div>`
              : `<div class="upl-empty"><div class="upl-icon">🖼</div><div class="upl-title">상품 이미지 업로드</div><div class="upl-sub">클릭하여 선택</div></div>`}
          </div>
          <input type="file" id="file-it${it.id}" accept="image/*" onchange="loadItemImg(this,${it.id})"/>
        </div>
        <div class="field">
          <span class="field-label-ko">상품명 · 용량 포함</span>
          <input type="text" value="${it.name}" placeholder="플뢰리에 네롤리 이리야 EDP 75ml"
            oninput="items.find(i=>i.id===${it.id}).name=this.value;render()"/>
        </div>
        <div class="field">
          <span class="field-label-ko">가격</span>
          <input type="text" value="${it.price}" placeholder="318,000원"
            oninput="items.find(i=>i.id===${it.id}).price=this.value;render()"/>
        </div>
        <div class="field">
          <span class="field-label-ko">상품 설명</span>
          <textarea oninput="items.find(i=>i.id===${it.id}).desc=this.value;render()">${it.desc}</textarea>
        </div>
      </div>`;
    list.appendChild(card);
  });
  document.getElementById('item-cnt').textContent = items.length + '개';
}

function addBenefit() {
  const id = ++bIdx;
  const ex = BN_EX[bns.length] || { cond:'', gift:'' };
  bns.push({ id, img: null, cond: ex.cond, gift: ex.gift });
  rebuildBns();
  render();
}
function delBn(id) {
  bns = bns.filter(b => b.id !== id);
  rebuildBns();
  render();
}

function rebuildBns() {
  const list = document.getElementById('bn-list');
  list.innerHTML = '';
  bns.forEach((bn, idx) => {
    const card = document.createElement('div');
    card.className = 'vcard';
    card.innerHTML = `
      <div class="vcard-head">
        <span class="vcard-label" style="background:#FFF8EC;color:#B07010">혜택 ${idx+1}</span>
        <button class="vcard-del" onclick="delBn(${bn.id})">✕</button>
      </div>
      <div class="vcard-body">
        <div class="field">
          <span class="field-label-ko">혜택 이미지</span>
          <div class="uploader" id="zone-bn${bn.id}" onclick="document.getElementById('file-bn${bn.id}').click()">
            ${bn.img
              ? `<div class="upl-filled"><img src="${bn.img}"/><button class="upl-remove" onclick="clearUpload('bn${bn.id}');event.stopPropagation()">✕</button></div>`
              : `<div class="upl-empty"><div class="upl-icon">🖼</div><div class="upl-title">혜택 이미지 업로드</div><div class="upl-sub">클릭하여 선택</div></div>`}
          </div>
          <input type="file" id="file-bn${bn.id}" accept="image/*" onchange="loadBnImg(this,${bn.id})"/>
        </div>
        <div class="field">
          <span class="field-label-ko">조건 <span style="color:var(--tx-hint);font-weight:300;font-size:11px">· 연한 글씨</span></span>
          <input type="text" value="${bn.cond}" placeholder="행사 SNS 이벤트 참여 시"
            oninput="bns.find(b=>b.id===${bn.id}).cond=this.value;render()"/>
        </div>
        <div class="field">
          <span class="field-label-ko">혜택 내용 <span style="color:var(--tx-hint);font-weight:300;font-size:11px">· 굵은 글씨</span></span>
          <input type="text" value="${bn.gift}" placeholder="2ml 바이알 1개 증정"
            oninput="bns.find(b=>b.id===${bn.id}).gift=this.value;render()"/>
        </div>
      </div>`;
    list.appendChild(card);
  });
  document.getElementById('bn-cnt').textContent = bns.length + '개';
}

// ─── RENDER ──────────────────────────────────────────────────
function v(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function render() {
  const brand = v('f-brand'), title = v('f-title');
  const period = v('f-period'), loc = v('f-loc');
  const intro = v('f-intro'), notes = v('f-notes');
  const lum = getLuminance(headerBg);
  const valColor = lum > 0.42 ? '#333' : 'rgba(255,255,255,.82)';

  let h = '';

  // 헤더
  h += `<div class="o-hd" style="background:${headerBg}">`;
  if (brand) h += `<div class="o-hd-title" style="color:${headerTx}">${brand}</div>`;
  h += `<div class="o-hd-title" style="color:${headerTx};margin-top:${brand?'0':'0'}">${title || '행사 제목 둘째줄을 입력하세요'}</div>`;
  h += `<div class="o-hd-meta" style="margin-top:10px">`;
  if (period) {
    h += `<div class="o-hd-row"><span class="o-hd-key" style="color:${headerMuted}">기간</span>`;
    h += `<span class="o-hd-val" style="color:${valColor}">${period}</span></div>`;
  }
  if (loc) {
    h += `<div class="o-hd-row"><span class="o-hd-key" style="color:${headerMuted}">장소</span>`;
    h += `<span class="o-hd-val" style="color:${valColor}">${loc}</span></div>`;
  }
  h += `</div></div>`;

  // 대표 이미지
  h += `<div class="o-hero">`;
  if (imgStore.hero) h += `<img src="${imgStore.hero}" style="width:390px;display:block"/>`;
  else h += `<div class="o-hero-ph">대표 이미지를 업로드하세요</div>`;
  h += `</div>`;

  // 소개
  if (intro) {
    const paras = intro.split(/\n{2,}/).map(p => p.replace(/\n/g,'<br>'));
    h += `<div class="o-intro">` + paras.map(p => `<p>${p}</p>`).join('') + `</div>`;
  }

  // Items
  if (items.length > 0) {
    h += `<div class="o-sec"><span class="o-sec-txt">Item</span><div class="o-sec-line"></div></div>`;
    items.forEach(it => {
      h += `<div class="o-item">`;
      h += it.img ? `<img src="${it.img}" class="o-item-img"/>` : `<div class="o-item-img-ph">이미지</div>`;
      h += `<div class="o-item-info">`;
      if (it.name)  h += `<div class="o-item-name">${it.name}</div>`;
      if (it.price) h += `<div class="o-item-price">${it.price}</div>`;
      if (it.desc)  h += `<div class="o-item-desc">${it.desc.replace(/\n/g,'<br>')}</div>`;
      h += `</div></div>`;
    });
  }

  // Benefits
  if (bns.length > 0) {
    h += `<div class="o-sec"><span class="o-sec-txt">Special Benefit</span><div class="o-sec-line"></div></div>`;
    bns.forEach((bn, idx) => {
      h += `<div class="o-bn">`;
      h += `<div class="o-bn-num">${idx+1}</div>`;
      h += bn.img ? `<img src="${bn.img}" class="o-bn-img"/>` : `<div class="o-bn-img-ph">이미지</div>`;
      h += `<div class="o-bn-txt">`;
      if (bn.cond) h += `<div class="o-bn-cond">${bn.cond}</div>`;
      if (bn.gift) h += `<div class="o-bn-gift">${bn.gift}</div>`;
      h += `</div></div>`;
    });
  }

  // 유의사항
  if (notes) {
    h += `<div class="o-notes">`;
    h += `<div class="o-notes-ttl">참고사항</div>`;
    h += `<div class="o-notes-txt">${notes}</div>`;
    h += `</div>`;
  }

  document.getElementById('output').innerHTML = h;
}

// ─── APPS SCRIPT URL ─────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZnJ_SrTV6YGFZNadBjghIiQwepHgDGRdwDNW__VdPLm1oywONwX9KGsPPJErCqKLYvQ/exec';

// ─── SAVE CODE ───────────────────────────────────────────────
function generateSaveCode() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  const arr = new Uint8Array(6);
  crypto.getRandomValues(arr);
  let code = 'POP-';
  for (let i = 0; i < 6; i++) code += chars[arr[i] % 36];
  return code;
}

// ─── FORM DATA COLLECT / RESTORE ─────────────────────────────
function collectFormData() {
  return {
    brand: v('f-brand'),
    title: v('f-title'),
    period: v('f-period'),
    loc: v('f-loc'),
    headerBg: headerBg,
    intro: v('f-intro'),
    notes: v('f-notes'),
    items: items.map(it => ({ name: it.name, price: it.price, desc: it.desc })),
    benefits: bns.map(bn => ({ cond: bn.cond, gift: bn.gift }))
  };
}

// ─── LOAD ─────────────────────────────────────────────────────
async function doLoad() {
  const codeInput = document.getElementById('load-code');
  const btn = document.getElementById('load-btn');
  const code = codeInput.value.trim();
  if (!code) return;

  btn.textContent = '불러오는 중...';
  btn.disabled = true;

  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=load&code=' + encodeURIComponent(code));
    const result = await res.json();

    if (result.status === 'ok') {
      try {
        const data = JSON.parse(result.data);
        restoreFormData(data);
        showToast('✓ 불러오기 완료');
      } catch(e) {
        showToast('⚠ 데이터 형식 오류');
      }
    } else if (result.status === 'not_found') {
      showToast('해당 코드의 저장 데이터가 없습니다');
    } else {
      showToast('⚠ 불러오기 실패');
    }
  } catch(e) {
    showToast('불러오기 실패. 네트워크를 확인해 주세요');
  }

  btn.textContent = '불러오기';
  btn.disabled = false;
}

function restoreFormData(data) {
  document.getElementById('f-brand').value = data.brand || '';
  document.getElementById('f-title').value = data.title || '';
  document.getElementById('f-period').value = data.period || '';
  document.getElementById('f-loc').value = data.loc || '';
  if (data.headerBg) applyColor(data.headerBg, '', '');
  document.getElementById('f-intro').value = data.intro || '';
  document.getElementById('f-notes').value = data.notes || '';

  // Items 재생성
  items = []; iIdx = 0;
  (data.items || []).forEach(it => {
    const id = ++iIdx;
    items.push({ id, img: null, name: it.name, price: it.price, desc: it.desc });
  });
  rebuildItems();

  // Benefits 재생성
  bns = []; bIdx = 0;
  (data.benefits || []).forEach(bn => {
    const id = ++bIdx;
    bns.push({ id, img: null, cond: bn.cond, gift: bn.gift });
  });
  rebuildBns();

  render();
}

// ─── EXPORT ──────────────────────────────────────────────────
async function doExport() {
  const btn = document.getElementById('expbtn');
  btn.disabled = true;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M3.5 5.5L7 9l3.5-3.5M1 11.5h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> 생성 중...`;
  try {
    await document.fonts.ready;
    const canvas = await html2canvas(document.getElementById('output'), {
      scale: 3, useCORS: true, allowTaint: true,
      backgroundColor: '#ffffff',
      scrollX: 0, scrollY: 0, width: 390, windowWidth: 390, logging: false,
    });
    const brand = v('f-brand') || '팝업행사';
    const title = v('f-title') || 'content';
    const fname = `[팝업]_${brand}_${title}`.replace(/[<>:"/\\|?*\s]/g,'_').slice(0,50) + '.jpg';
    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fname;
      a.click();
    }, 'image/jpeg', 0.95);

    // ── 저장 로직: 항상 새 코드 생성 ──
    const code = generateSaveCode();
    const formData = collectFormData();
    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'save', code: code, type: 'popup', data: JSON.stringify(formData) })
      });
      const result = await res.json();
      if (result.status === 'ok') {
        showSaveModal(code);
      } else {
        showToast('⚠ 저장 실패');
      }
    } catch(e) {
      showToast('⚠ 저장 실패');
    }

  } catch(e) {
    showToast('⚠  내보내기 실패: ' + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M3.5 5.5L7 9l3.5-3.5M1 11.5h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> JPG 내보내기`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

let lastSavedCode = '';
function showSaveModal(code) {
  lastSavedCode = code;
  document.getElementById('save-modal-code').textContent = code;
  document.getElementById('save-modal').classList.add('show');
}
function closeSaveModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('save-modal').classList.remove('show');
}
async function copySaveCode() {
  try {
    await navigator.clipboard.writeText(lastSavedCode);
    showToast('✓ 코드가 클립보드에 복사되었습니다');
  } catch(e) {
    showToast('⚠ 복사 실패');
  }
}

function resetAll() {
  ['f-brand','f-title','f-period','f-loc','f-intro','f-notes'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });
  imgStore.hero = null;
  const hz = document.getElementById('hero-zone');
  hz.innerHTML = `<div class="upl-empty"><div class="upl-icon">🖼</div><div class="upl-title">클릭하여 이미지 업로드</div><div class="upl-sub">JPG · PNG · WEBP</div></div>`;
  hz.onclick = () => document.getElementById('hero-file').click();
  items = []; bns = []; iIdx = 0; bIdx = 0;
  rebuildItems(); rebuildBns();
  applyColor('#FFFFFF', 0, '화이트');
  render();
}

// ─── INIT ─────────────────────────────────────────────────────
buildSwatches();
document.getElementById('hero-zone').onclick = () => document.getElementById('hero-file').click();
render();
</script>
