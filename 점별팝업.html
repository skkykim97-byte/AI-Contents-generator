<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>팝업 행사 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────
   TOOL UI
───────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C8102E;
  --bg:#F0EFE8;
  --surface:#FFFFFF;
  --bd:#E0DFD8;
  --bd-lt:#ECEAE3;
  --tx:#1A1A18;
  --tx-m:#767670;
  --tx-h:#B8B7B0;
  --font:'Noto Sans KR',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Top Bar */
.topbar{height:50px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.tp-chip{background:#FFF0F3;color:var(--red);font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.tp-title{font-size:13px;font-weight:700;color:var(--tx)}
.tp-sub{font-size:12px;color:var(--tx-m);flex:1}
.tp-btn{height:32px;padding:0 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);border:none;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--tx-m)}
.btn-ghost:hover{border-color:#999;color:var(--tx)}
.btn-dark{background:var(--tx);color:#fff}
.btn-dark:hover{background:#333}
.btn-dark:disabled{background:#bbb;cursor:not-allowed}

/* Layout */
.main{display:flex;flex:1;overflow:hidden}

/* Form */
.form-wrap{width:400px;min-width:400px;overflow-y:auto;background:var(--bg);border-right:1px solid var(--bd)}
.form-inner{padding:16px;display:flex;flex-direction:column;gap:8px}
.blk{background:#fff;border:1px solid var(--bd-lt);border-radius:10px;overflow:hidden}
.blk-head{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd-lt)}
.blk-ico{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.blk-name{flex:1;font-size:12px;font-weight:700;color:var(--tx);letter-spacing:.2px}
.blk-badge{font-size:10px;color:var(--tx-m);background:var(--bg);border:1px solid var(--bd);padding:2px 6px;border-radius:8px}
.blk-body{padding:14px;display:flex;flex-direction:column;gap:11px}
.field{display:flex;flex-direction:column;gap:4px}
.lbl{font-size:11px;font-weight:700;color:var(--tx-m);letter-spacing:.2px}
input[type=text],textarea{width:100%;padding:7px 9px;border:1px solid var(--bd);border-radius:6px;font-size:13px;font-family:var(--font);color:var(--tx);background:#fff;outline:none;transition:border-color .15s;line-height:1.5}
input[type=text]:focus,textarea:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(200,16,46,.07)}
input::placeholder,textarea::placeholder{color:var(--tx-h)}
textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Color */
.color-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:2px}
.cdot{width:24px;height:24px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .12s;flex-shrink:0}
.cdot:hover{transform:scale(1.1)}
.cdot.on{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--tx);transform:scale(1.08)}
.color-custom{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--bd);border-radius:6px;background:#fff;cursor:pointer;transition:border-color .15s}
.color-custom:hover{border-color:#aaa}
.cswatch{width:26px;height:26px;border-radius:5px;border:1px solid rgba(0,0,0,.08);flex-shrink:0}
.chex{flex:1;font-size:12px;font-family:monospace;color:var(--tx-m)}
input[type=color]{position:absolute;opacity:0;width:0;height:0}

/* Upload */
.uploader{border:1.5px dashed var(--bd);border-radius:7px;background:#FAFAF8;cursor:pointer;overflow:hidden;transition:all .15s}
.uploader:hover{border-color:var(--red);background:#FFF9F9}
.upl-inner{padding:13px;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center}
.upl-ico{font-size:18px}
.upl-lbl{font-size:11px;font-weight:700;color:var(--tx-m)}
.upl-hint{font-size:10px;color:var(--tx-h)}
.upl-prev{position:relative}
.upl-prev img{width:100%;display:block;max-height:130px;object-fit:cover;border-radius:5px}
.upl-del{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1;font-weight:700}
.upl-del:hover{background:rgba(200,16,46,.85)}
input[type=file]{display:none}

/* Variable cards */
.vcard{background:var(--bg);border:1px solid var(--bd-lt);border-radius:7px;padding:12px;display:flex;flex-direction:column;gap:9px}
.vc-head{display:flex;align-items:center;justify-content:space-between}
.vc-num{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.vc-del{width:24px;height:24px;border-radius:5px;background:transparent;border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx-m);font-size:12px;transition:all .12s;font-weight:700}
.vc-del:hover{border-color:#E55;color:#E55;background:#FFF0F0}
.add-btn{width:100%;padding:8px;border:1.5px dashed var(--bd);border-radius:7px;background:transparent;cursor:pointer;font-size:12px;font-weight:700;color:var(--tx-m);font-family:var(--font);transition:all .15s}
.add-btn:hover{border-color:var(--red);color:var(--red);background:#FFF8F9}

/* Preview panel */
.prev-wrap{flex:1;overflow-y:auto;background:#C8C7BE;display:flex;flex-direction:column;align-items:center;padding:28px 20px}
.prev-lbl{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:14px;font-family:var(--font)}
.prev-device{background:#fff;width:390px;box-shadow:0 20px 60px rgba(0,0,0,.25);border-radius:2px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1A1A18;color:#fff;padding:9px 18px;border-radius:8px;font-size:12px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;font-family:var(--font)}
.toast.on{opacity:1}

/* ─────────────────────────────────────────────
   CONTENT OUTPUT  ← 원본 완전 재현
   모든 치수는 390px 기준 원본에서 측정
───────────────────────────────────────────── */
#co{width:390px;font-family:'Noto Sans KR',sans-serif;background:#fff;-webkit-font-smoothing:antialiased}

/* 헤더 */
.co-hd{padding:20px 20px 18px}
.co-hd-brand{font-size:12px;font-weight:400;letter-spacing:.3px;margin-bottom:7px;line-height:1.4}
.co-hd-title{font-size:19px;font-weight:700;letter-spacing:-0.4px;line-height:1.35;margin-bottom:14px;word-break:keep-all}
.co-hd-meta{display:flex;flex-direction:column;gap:4px}
.co-hd-row{display:flex;align-items:baseline;font-size:12px;font-weight:400;gap:0}
.co-hd-key{min-width:26px;margin-right:8px;flex-shrink:0}
.co-hd-val{line-height:1.5}

/* 대표 이미지 */
.co-hero img,.co-hero-ph{width:390px;display:block}
.co-hero-ph{height:210px;background:#ECEAE3;display:flex;align-items:center;justify-content:center;font-size:12px;color:#B0AF A8;font-family:'Noto Sans KR',sans-serif}

/* 소개 텍스트 */
.co-intro{padding:22px 20px;border-bottom:1px solid #EAEAE4}
.co-intro p{font-size:13px;font-weight:400;color:#333;line-height:1.9;word-break:keep-all}
.co-intro p+p{margin-top:12px}

/* 섹션 타이틀 */
.co-sec{padding:22px 20px 6px;display:flex;align-items:center;gap:11px}
.co-sec-txt{font-size:14.5px;font-weight:700;color:#111;letter-spacing:.3px;white-space:nowrap}
.co-sec-line{flex:1;height:1px;background:#DDDBD2}

/* Item 목록 */
.co-item{display:flex;align-items:flex-start;gap:14px;padding:18px 20px;border-bottom:1px solid #ECEAE4}
.co-item-img{width:130px;height:130px;object-fit:cover;flex-shrink:0;display:block;background:#F5F4EF}
.co-item-img-ph{width:130px;height:130px;flex-shrink:0;background:#ECEAE3;display:flex;align-items:center;justify-content:center;font-size:11px;color:#B0AFA8;font-family:'Noto Sans KR',sans-serif}
.co-item-info{flex:1;min-width:0;padding-top:2px}
.co-item-name{font-size:13.5px;font-weight:700;color:#111;line-height:1.45;margin-bottom:5px;word-break:keep-all}
.co-item-price{font-size:15.5px;font-weight:700;color:#111;margin-bottom:9px;letter-spacing:-.2px}
.co-item-desc{font-size:11.5px;font-weight:400;color:#888;line-height:1.75;word-break:keep-all}

/* Special Benefit */
.co-bn{display:flex;align-items:flex-start;gap:11px;padding:15px 20px;border-bottom:1px solid #ECEAE4}
.co-bn-num{width:22px;height:22px;border-radius:50%;background:#1A1A18;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px;font-family:'Noto Sans KR',sans-serif}
.co-bn-img{width:80px;height:80px;object-fit:cover;flex-shrink:0;display:block;background:#F5F4EF}
.co-bn-img-ph{width:80px;height:80px;flex-shrink:0;background:#ECEAE3;display:flex;align-items:center;justify-content:center;font-size:10px;color:#B0AFA8;font-family:'Noto Sans KR',sans-serif}
.co-bn-info{flex:1;min-width:0;padding-top:2px}
.co-bn-cond{font-size:12px;font-weight:400;color:#888;line-height:1.5;margin-bottom:4px;word-break:keep-all}
.co-bn-gift{font-size:13px;font-weight:700;color:#111;line-height:1.5;word-break:keep-all}

/* 유의사항 */
.co-notes{padding:18px 20px 26px;background:#F7F6F0}
.co-notes-ttl{font-size:10px;font-weight:700;color:#BBBAB4;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:9px;font-family:'Noto Sans KR',sans-serif}
.co-notes-txt{font-size:11px;font-weight:400;color:#BBBAB4;line-height:1.9;white-space:pre-wrap;word-break:keep-all}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <span class="tp-chip">팝업행사</span>
  <span class="tp-title">점별 팝업 행사 생성기</span>
  <span class="tp-sub">Noto Sans KR · JPG 출력</span>
  <button class="tp-btn btn-ghost" onclick="resetAll()">초기화</button>
  <button class="tp-btn btn-dark" id="expbtn" onclick="doExport()">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 6l4 4 4-4M2 13h12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    JPG 내보내기
  </button>
</div>

<div class="main">
<!-- ── FORM ── -->
<div class="form-wrap"><div class="form-inner">

  <!-- ① 행사 기본 정보 -->
  <div class="blk">
    <div class="blk-head">
      <div class="blk-ico" style="background:#FFF0F3;color:#C8102E">①</div>
      <span class="blk-name">행사 기본 정보</span>
    </div>
    <div class="blk-body">
      <div class="field"><span class="lbl">브랜드명 (헤더 상단 소제목)</span>
        <input type="text" id="f-brand" placeholder="반클리프 아펠 오뜨 퍼퓨머리" oninput="render()"/></div>
      <div class="field"><span class="lbl">행사 제목</span>
        <input type="text" id="f-title" placeholder="국내 첫 Pop-Up Open" oninput="render()"/></div>
      <div class="row2">
        <div class="field"><span class="lbl">기간</span>
          <input type="text" id="f-period" placeholder="3.26(목) - 4.02(월)" oninput="render()"/></div>
        <div class="field"><span class="lbl">점포</span>
          <input type="text" id="f-store" placeholder="잠실점" oninput="render()"/></div>
      </div>
      <div class="field"><span class="lbl">장소</span>
        <input type="text" id="f-loc" placeholder="롯데백화점 본점 1F 명품관" oninput="render()"/></div>
      <!-- 헤더 색상 -->
      <div class="field">
        <span class="lbl">헤더 배경 색상</span>
        <div class="color-row" id="cdots"></div>
        <div class="color-custom" onclick="document.getElementById('cpicker').click()">
          <div class="cswatch" id="cswatch"></div>
          <span class="chex" id="chex">#FFFFFF</span>
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;color:#bbb"><path d="M2 12.5l9-9 2.5 2.5-9 9H2v-2.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          <input type="color" id="cpicker" value="#FFFFFF" oninput="applyColor(this.value,'x','직접 선택')"/>
        </div>
      </div>
    </div>
  </div>

  <!-- ② 브랜드 소개 -->
  <div class="blk">
    <div class="blk-head">
      <div class="blk-ico" style="background:#EFF4FF;color:#3B6BDE">②</div>
      <span class="blk-name">브랜드 소개</span>
    </div>
    <div class="blk-body">
      <div class="field"><span class="lbl">대표 이미지</span>
        <div class="uploader" id="hero-zone" onclick="document.getElementById('hero-file').click()">
          <div class="upl-inner" id="hero-ph"><div class="upl-ico">🖼</div><div class="upl-lbl">클릭하여 업로드</div><div class="upl-hint">JPG · PNG · WEBP</div></div>
        </div>
        <input type="file" id="hero-file" accept="image/*" onchange="loadImg(this,'hero')"/>
      </div>
      <div class="field"><span class="lbl">소개 문구 (단락 구분: 빈 줄)</span>
        <textarea id="f-intro" rows="5" placeholder="반클리프 아펠 여행을 자연인&#10;올가가 건강하고 상쾌한 향기로 느끼는 ...&#10;&#10;하이 우솔화가 추구하는 원저림, 높은 가지의..." oninput="render()"></textarea>
      </div>
    </div>
  </div>

  <!-- ③ Item 섹션 -->
  <div class="blk">
    <div class="blk-head">
      <div class="blk-ico" style="background:#EFF9F1;color:#2D8A4E">③</div>
      <span class="blk-name">Item 섹션</span>
      <span class="blk-badge" id="item-badge">0개</span>
    </div>
    <div class="blk-body">
      <div id="items-cont" style="display:flex;flex-direction:column;gap:8px"></div>
      <button class="add-btn" onclick="addItem()">+ 상품 추가</button>
    </div>
  </div>

  <!-- ④ Special Benefit -->
  <div class="blk">
    <div class="blk-head">
      <div class="blk-ico" style="background:#FFF8EC;color:#B07310">④</div>
      <span class="blk-name">Special Benefit</span>
      <span class="blk-badge" id="bn-badge">0개</span>
    </div>
    <div class="blk-body">
      <div id="bn-cont" style="display:flex;flex-direction:column;gap:8px"></div>
      <button class="add-btn" onclick="addBenefit()">+ 혜택 추가</button>
    </div>
  </div>

  <!-- ⑤ 유의사항 -->
  <div class="blk">
    <div class="blk-head">
      <div class="blk-ico" style="background:#F5F4EF;color:#888">⑤</div>
      <span class="blk-name">유의사항</span>
      <span class="blk-badge">선택</span>
    </div>
    <div class="blk-body">
      <textarea id="f-notes" rows="4" placeholder="※ 이벤트는 사전 예고 없이 변경되거나 조기 종료될 수 있습니다&#10;※ 혜택은 1인 1회 제공됩니다" oninput="render()"></textarea>
    </div>
  </div>

</div></div>

<!-- ── PREVIEW ── -->
<div class="prev-wrap">
  <div class="prev-lbl">미리보기 · 390px</div>
  <div class="prev-device"><div id="co"></div></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ── Color System ──────────────────────────
const COLORS=[
  {h:'#FFFFFF',n:'화이트'},
  {h:'#1A1A18',n:'블랙'},
  {h:'#C8102E',n:'레드'},
  {h:'#1B2A4A',n:'네이비'},
  {h:'#2D4A3E',n:'딥그린'},
  {h:'#F5F0E8',n:'아이보리'},
  {h:'#E8E0CE',n:'베이지'},
  {h:'#3E3A58',n:'퍼플'},
];
let hdrBg='#FFFFFF', hdrTx='#1A1A18', hdrTxMuted='rgba(0,0,0,0.38)';

function lum(hex){
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  return .299*r+.587*g+.114*b;
}
function applyColor(h,id,name){
  hdrBg=h;
  const dark=lum(h)>.45;
  hdrTx=dark?'#1A1A18':'#FFFFFF';
  hdrTxMuted=dark?'rgba(0,0,0,0.38)':'rgba(255,255,255,0.55)';
  document.getElementById('cswatch').style.background=h;
  document.getElementById('chex').textContent=h.toUpperCase();
  document.getElementById('cpicker').value=h;
  document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('on'));
  if(id!=='x'){const d=document.getElementById('cd'+id);if(d)d.classList.add('on');}
  render();
}
function buildColors(){
  const c=document.getElementById('cdots');
  COLORS.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='cdot'+(i===0?' on':'');
    d.id='cd'+i;
    d.style.cssText=`background:${p.h};${p.h==='#FFFFFF'?'border:1.5px solid #CCC;':''}`;
    d.title=p.n;
    d.onclick=()=>applyColor(p.h,i,p.n);
    c.appendChild(d);
  });
  applyColor('#FFFFFF',0,'화이트');
}

// ── Image Storage ─────────────────────────
const imgs={hero:null};

function loadImg(input,key){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    imgs[key]=e.target.result;
    showImgPreview(key,e.target.result);
    render();
  };
  r.readAsDataURL(f);
}
function loadItemImg(input,id){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const it=items.find(i=>i.id===id);
    if(it){it.img=e.target.result;showImgPreview('it'+id,e.target.result);}
    render();
  };
  r.readAsDataURL(f);
}
function loadBnImg(input,id){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const bn=bns.find(b=>b.id===id);
    if(bn){bn.img=e.target.result;showImgPreview('bn'+id,e.target.result);}
    render();
  };
  r.readAsDataURL(f);
}
function showImgPreview(key,src){
  const isHero=key==='hero';
  const zoneId=isHero?'hero-zone':'zone-'+key;
  const zone=document.getElementById(zoneId);
  if(!zone)return;
  zone.onclick=null;
  zone.innerHTML=`<div class="upl-prev"><img src="${src}"/><button class="upl-del" onclick="clearImg('${key}');event.stopPropagation()">✕</button></div>`;
}
function clearImg(key){
  if(key==='hero'){
    imgs.hero=null;
    const z=document.getElementById('hero-zone');
    z.innerHTML=`<div class="upl-inner" id="hero-ph"><div class="upl-ico">🖼</div><div class="upl-lbl">클릭하여 업로드</div><div class="upl-hint">JPG · PNG · WEBP</div></div>`;
    z.onclick=()=>document.getElementById('hero-file').click();
  } else if(key.startsWith('it')){
    const id=parseInt(key.slice(2));
    const it=items.find(i=>i.id===id); if(it)it.img=null;
    restoreZone('zone-it'+id,'상품 이미지','file-it'+id);
  } else if(key.startsWith('bn')){
    const id=parseInt(key.slice(2));
    const bn=bns.find(b=>b.id===id); if(bn)bn.img=null;
    restoreZone('zone-bn'+id,'혜택 이미지','file-bn'+id);
  }
  render();
}
function restoreZone(zid,lbl,fid){
  const z=document.getElementById(zid); if(!z)return;
  z.innerHTML=`<div class="upl-inner"><div class="upl-ico">🖼</div><div class="upl-lbl">${lbl}</div><div class="upl-hint">클릭하여 선택</div></div>`;
  z.onclick=()=>document.getElementById(fid).click();
}

// ── Items ─────────────────────────────────
let items=[],bns=[],iidx=0,bidx=0;

const ITEM_EX=[
  {name:'플뢰리에 네롤리 이리야 EDP 75ml',price:'318,000원',desc:'한 송이 꽃향을 떠올리게 하는 상큼한 시트러스, 모그레비 그린의 신선한 이리야의 매혹적인 향을 담았습니다'},
  {name:'플뢰리에 떼 이마라 EDP 75ml',price:'380,000원',desc:'부드럽고 고혹적인 꽃잎의 잔향과 우아한 우드 베이스가 오래도록 지속되는 깊은 향수'},
  {name:'상탈 봉봉 프 레장 75ml',price:'',desc:'달콤한 바닐라와 따뜻한 샌달우드가 어우러져 만들어내는 안락하고 감각적인 향'},
  {name:'레 클레마시크 컬렉션 100ml',price:'427,000원',desc:'클래식한 콜렉션 라인의 대표 향수로, 우아하고 고급스러운 플로럴 무스크 향'},
];
const BN_EX=[
  {cond:'행사 SNS 이벤트 참여 시',gift:'2ml 바이알 1개 증정'},
  {cond:'모든 구매 고객',gift:'2ml 바이알 3종 슬리브 세트 증정'},
  {cond:'40만원 이상 구매 시',gift:'75ml 미니어처 추가 증정'},
  {cond:'50만원 이상 구매 시',gift:'75ml × 3 디스커버리 세트 추가 증정'},
  {cond:'캘리그래피 & 플라워 드로잉 카드 이벤트',gift:'참여 고객 전원 기념 엽서 증정'},
];

function addItem(){
  const id=++iidx;
  const ex=ITEM_EX[items.length]||{name:'',price:'',desc:''};
  items.push({id,img:null,name:ex.name,price:ex.price,desc:ex.desc});
  rebuildItems(); render();
}
function delItem(id){items=items.filter(i=>i.id!==id);rebuildItems();render();}

function rebuildItems(){
  const c=document.getElementById('items-cont'); c.innerHTML='';
  items.forEach((it,idx)=>{
    const d=document.createElement('div'); d.className='vcard';
    const imgKey='it'+it.id;
    d.innerHTML=`
      <div class="vc-head">
        <span class="vc-num" style="background:#EFF9F1;color:#2D8A4E">Item ${idx+1}</span>
        <button class="vc-del" onclick="delItem(${it.id})">✕</button>
      </div>
      <div class="field"><span class="lbl">상품 이미지</span>
        <div class="uploader" id="zone-${imgKey}" onclick="document.getElementById('file-${imgKey}').click()">
          ${it.img?`<div class="upl-prev"><img src="${it.img}"/><button class="upl-del" onclick="clearImg('${imgKey}');event.stopPropagation()">✕</button></div>`:`<div class="upl-inner"><div class="upl-ico">🖼</div><div class="upl-lbl">상품 이미지</div><div class="upl-hint">클릭하여 선택</div></div>`}
        </div>
        <input type="file" id="file-${imgKey}" accept="image/*" onchange="loadItemImg(this,${it.id})"/>
      </div>
      <div class="field"><span class="lbl">상품명 (용량 포함)</span>
        <input type="text" value="${it.name}" placeholder="플뢰리에 네롤리 이리야 EDP 75ml"
          oninput="items.find(i=>i.id==${it.id}).name=this.value;render()"/></div>
      <div class="field"><span class="lbl">가격</span>
        <input type="text" value="${it.price}" placeholder="318,000원"
          oninput="items.find(i=>i.id==${it.id}).price=this.value;render()"/></div>
      <div class="field"><span class="lbl">상품 설명</span>
        <textarea oninput="items.find(i=>i.id==${it.id}).desc=this.value;render()">${it.desc}</textarea></div>`;
    c.appendChild(d);
  });
  document.getElementById('item-badge').textContent=items.length+'개';
}

function addBenefit(){
  const id=++bidx;
  const ex=BN_EX[bns.length]||{cond:'',gift:''};
  bns.push({id,img:null,cond:ex.cond,gift:ex.gift});
  rebuildBns(); render();
}
function delBn(id){bns=bns.filter(b=>b.id!==id);rebuildBns();render();}

function rebuildBns(){
  const c=document.getElementById('bn-cont'); c.innerHTML='';
  bns.forEach((bn,idx)=>{
    const d=document.createElement('div'); d.className='vcard';
    const imgKey='bn'+bn.id;
    d.innerHTML=`
      <div class="vc-head">
        <span class="vc-num" style="background:#FFF8EC;color:#B07310">혜택 ${idx+1}</span>
        <button class="vc-del" onclick="delBn(${bn.id})">✕</button>
      </div>
      <div class="field"><span class="lbl">혜택 이미지</span>
        <div class="uploader" id="zone-${imgKey}" onclick="document.getElementById('file-${imgKey}').click()">
          ${bn.img?`<div class="upl-prev"><img src="${bn.img}"/><button class="upl-del" onclick="clearImg('${imgKey}');event.stopPropagation()">✕</button></div>`:`<div class="upl-inner"><div class="upl-ico">🖼</div><div class="upl-lbl">혜택 이미지</div><div class="upl-hint">클릭하여 선택</div></div>`}
        </div>
        <input type="file" id="file-${imgKey}" accept="image/*" onchange="loadBnImg(this,${bn.id})"/>
      </div>
      <div class="field"><span class="lbl">조건 (연한 글씨)</span>
        <input type="text" value="${bn.cond}" placeholder="행사 SNS 이벤트 참여 시"
          oninput="bns.find(b=>b.id==${bn.id}).cond=this.value;render()"/></div>
      <div class="field"><span class="lbl">혜택 내용 (굵은 글씨)</span>
        <input type="text" value="${bn.gift}" placeholder="2ml 바이알 1개 증정"
          oninput="bns.find(b=>b.id==${bn.id}).gift=this.value;render()"/></div>`;
    c.appendChild(d);
  });
  document.getElementById('bn-badge').textContent=bns.length+'개';
}

// ── Render ────────────────────────────────
function v(id){const e=document.getElementById(id);return e?e.value.trim():'';}

function render(){
  const brand=v('f-brand'),title=v('f-title'),period=v('f-period'),store=v('f-store'),loc=v('f-loc');
  const intro=v('f-intro'),notes=v('f-notes');
  let h='';

  // 헤더
  h+=`<div class="co-hd" style="background:${hdrBg}">`;
  if(brand) h+=`<div class="co-hd-brand" style="color:${hdrTxMuted}">${brand}</div>`;
  h+=`<div class="co-hd-title" style="color:${hdrTx}">${title||'행사 제목을 입력하세요'}</div>`;
  h+=`<div class="co-hd-meta">`;
  if(period||store){
    h+=`<div class="co-hd-row"><span class="co-hd-key" style="color:${hdrTxMuted}">기간</span><span class="co-hd-val" style="color:${lum(hdrBg)>.45?'#444':'rgba(255,255,255,.85)'}">`;
    h+=(period||'')+(store?`&nbsp;&nbsp;${store}`:'');
    h+=`</span></div>`;
  }
  if(loc) h+=`<div class="co-hd-row"><span class="co-hd-key" style="color:${hdrTxMuted}">장소</span><span class="co-hd-val" style="color:${lum(hdrBg)>.45?'#444':'rgba(255,255,255,.85)'}">${loc}</span></div>`;
  h+=`</div></div>`;

  // 대표 이미지
  h+=`<div class="co-hero">`;
  if(imgs.hero) h+=`<img src="${imgs.hero}" style="width:390px;display:block"/>`;
  else h+=`<div class="co-hero-ph" style="height:210px;background:#ECEAE3;display:flex;align-items:center;justify-content:center;font-size:12px;color:#B0AFA8;font-family:'Noto Sans KR',sans-serif">대표 이미지를 업로드하세요</div>`;
  h+=`</div>`;

  // 소개
  if(intro){
    const paras=intro.split(/\n{2,}/).map(p=>p.replace(/\n/g,'<br>'));
    h+=`<div class="co-intro">`+paras.map(p=>`<p>${p}</p>`).join('')+`</div>`;
  }

  // Items
  if(items.length>0){
    h+=`<div class="co-sec"><span class="co-sec-txt">Item</span><div class="co-sec-line"></div></div>`;
    items.forEach(it=>{
      h+=`<div class="co-item">`;
      h+=it.img?`<img src="${it.img}" class="co-item-img"/>`:`<div class="co-item-img-ph">이미지</div>`;
      h+=`<div class="co-item-info">`;
      if(it.name) h+=`<div class="co-item-name">${it.name}</div>`;
      if(it.price) h+=`<div class="co-item-price">${it.price}</div>`;
      if(it.desc) h+=`<div class="co-item-desc">${it.desc.replace(/\n/g,'<br>')}</div>`;
      h+=`</div></div>`;
    });
  }

  // Benefits
  if(bns.length>0){
    h+=`<div class="co-sec"><span class="co-sec-txt">Special Benefit</span><div class="co-sec-line"></div></div>`;
    bns.forEach((bn,idx)=>{
      h+=`<div class="co-bn">`;
      h+=`<div class="co-bn-num">${idx+1}</div>`;
      h+=bn.img?`<img src="${bn.img}" class="co-bn-img"/>`:`<div class="co-bn-img-ph">이미지</div>`;
      h+=`<div class="co-bn-info">`;
      if(bn.cond) h+=`<div class="co-bn-cond">${bn.cond}</div>`;
      if(bn.gift) h+=`<div class="co-bn-gift">${bn.gift}</div>`;
      h+=`</div></div>`;
    });
  }

  // Notes
  if(notes){
    h+=`<div class="co-notes"><div class="co-notes-ttl">유의사항</div><div class="co-notes-txt">${notes}</div></div>`;
  }

  document.getElementById('co').innerHTML=h;
}

// ── Export JPG ────────────────────────────
async function doExport(){
  const btn=document.getElementById('expbtn');
  btn.disabled=true;
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 6l4 4 4-4M2 13h12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg> 생성 중...`;
  try{
    await document.fonts.ready;
    const canvas=await html2canvas(document.getElementById('co'),{
      scale:2,useCORS:true,allowTaint:true,backgroundColor:'#fff',
      scrollX:0,scrollY:0,width:390,windowWidth:390,
      logging:false,
    });
    const brand=v('f-brand')||'팝업행사';
    const title=v('f-title')||'content';
    const fname=`[팝업]_${brand}_${title}`.replace(/[<>:"/\\|?*]/g,'_').replace(/\s+/g,'_').slice(0,50)+'.jpg';
    canvas.toBlob(blob=>{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=fname;
      a.click();
      toast('✓  저장 완료 — '+fname);
    },'image/jpeg',.95);
  }catch(e){toast('⚠  실패: '+e.message);}
  btn.disabled=false;
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 6l4 4 4-4M2 13h12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg> JPG 내보내기`;
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),3000);
}

function resetAll(){
  ['f-brand','f-title','f-period','f-store','f-loc','f-intro','f-notes'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  imgs.hero=null;
  const hz=document.getElementById('hero-zone');
  hz.innerHTML=`<div class="upl-inner" id="hero-ph"><div class="upl-ico">🖼</div><div class="upl-lbl">클릭하여 업로드</div><div class="upl-hint">JPG · PNG · WEBP</div></div>`;
  hz.onclick=()=>document.getElementById('hero-file').click();
  items=[];bns=[];iidx=0;bidx=0;
  rebuildItems();rebuildBns();
  applyColor('#FFFFFF',0,'화이트');
  render();
}

// ── Init ──────────────────────────────────
buildColors();
document.getElementById('hero-zone').onclick=()=>document.getElementById('hero-file').click();
render();
</script>
