
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap');

.gw {
  min-height: 480px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem;
  font-family: 'Noto Sans KR', sans-serif;
  background: radial-gradient(ellipse at 50% 0%, #ebebeb 0%, #f5f5f5 40%, #ffffff 75%);
}


.g-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  margin-bottom: 2.5rem;
  text-align: center;
}

/* 메인 영문 타이틀 */
.g-title-en {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 45px;
  font-weight: 900;
  color: #1a1a1a;
  margin: 0;
  letter-spacing: -0.01em;
  line-height: 0.95;
  text-transform: uppercase;
  text-align: center;
}

/* 영문 타이틀 내 강조 */
.g-title-en .accent {
  color: #534AB7;
}

/* 한글 서브타이틀 */
.g-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12.5px;
  font-weight: 500;
  color: #aaa;
  margin: 10px 0 0;
  letter-spacing: 0.08em;
}

/* 타이틀 하단 데코 라인 */
.g-title-deco {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
}

.g-title-deco-line {
  width: 36px;
  height: 1px;
  background: #e0e0e0;
}

.g-title-deco-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #534AB7;
}

.g-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  width: 100%;
  max-width: 580px;
}

.g-card {
  background: #ffffff;
  border: 1px solid #e0e0e0;
  border-radius: 14px;
  padding: 1.5rem;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 10px;
  text-align: left;
  transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.15s;
  user-select: none;
}

.g-card:hover {
  border-color: #bbb;
  transform: translateY(-2px);
}

.g-card.active {
  background: #1a1a1a;
  border-color: #1a1a1a;
  transform: scale(0.98);
}

.g-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  width: fit-content;
  letter-spacing: 0.04em;
  background: #f0f0f0;
  color: #444;
  transition: background 0.18s, color 0.18s;
}

.g-card.active .g-badge {
  background: #333;
  color: #ccc;
}

.g-name {
  font-size: 17px;
  font-weight: 700;
  color: #1a1a1a;
  margin: 0;
  transition: color 0.18s;
}

.g-card.active .g-name { color: #ffffff; }

.g-desc {
  font-size: 12.5px;
  color: #666;
  margin: 0;
  line-height: 1.65;
  flex: 1;
  transition: color 0.18s;
}

.g-card.active .g-desc { color: #aaa; }

.g-cta {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  font-weight: 700;
  color: #534AB7;
  margin-top: 4px;
  transition: color 0.18s;
}

.g-card.active .g-cta { color: #a89ff0; }
.g-cta i { font-size: 14px; transition: transform 0.15s; }
.g-card:hover .g-cta i { transform: translateX(3px); }
</style>

<div class="gw">
<div class="g-header">
    <h1 class="g-title-en">Contents<br><span class="accent">Create</span> Center</h1>
    <p class="g-title">콘텐츠 제작 센터</p>
    <div class="g-title-deco">
      <span class="g-title-deco-line"></span>
      <span class="g-title-deco-dot"></span>
      <span class="g-title-deco-line"></span>
    </div>
  </div>

  <div class="g-cards">
    <div class="g-card" id="card-gen"
      onmousedown="this.classList.add('active')"
      onmouseup="this.classList.remove('active'); sendPrompt('콘텐츠 생성기 페이지로 이동해줘')"
      onmouseleave="this.classList.remove('active')">
      <span class="g-badge"><i class="ti ti-sparkles" aria-hidden="true" style="font-size:10px"></i> 생성기</span>
      <p class="g-name">콘텐츠 생성기</p>
      <p class="g-desc">점별 팝업, N주년 행사 등 자주 활용하는<br>쇼핑뉴스 디자인을 만들 수 있어요.</p>
      <span class="g-cta">시작하기 <i class="ti ti-arrow-right"></i></span>
    </div>

    <div class="g-card" id="card-edit"
      onmousedown="this.classList.add('active')"
      onmouseup="this.classList.remove('active'); sendPrompt('콘텐츠 에디터 페이지로 이동해줘')"
      onmouseleave="this.classList.remove('active')">
      <span class="g-badge"><i class="ti ti-code" aria-hidden="true" style="font-size:10px"></i> 에디터</span>
      <p class="g-name">콘텐츠 에디터</p>
      <p class="g-desc">ZIP 파일을 넣어 HTML 콘텐츠를<br>쉽게 수정할 수 있어요.</p>
      <span class="g-cta">시작하기 <i class="ti ti-arrow-right"></i></span>
    </div>
  </div>
</div>
